<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d0d0d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Inkwell</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Lora:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Top Bar -->
    <header class="top-bar">
        <div class="view-tabs">
            <button class="view-tab active" data-view="0">Scan</button>
            <button class="view-tab" data-view="1">Text</button>
            <button class="view-tab" data-view="2">Library</button>
        </div>
        <button id="btn-settings" class="btn-icon settings-btn" aria-label="Settings">&#9881;</button>
        <span class="version-tag">v11</span>
    </header>

    <!-- Main Container (3 views) -->
    <div id="view-container" class="view-container">

        <!-- Scan View -->
        <section id="screen-scan" class="screen view-screen">
            <div class="scan-viewport">
                <video id="camera-feed" autoplay playsinline muted></video>
                <div id="crop-guide" class="crop-guide">
                    <div class="crop-corner top-left"></div>
                    <div class="crop-corner top-right"></div>
                    <div class="crop-corner bottom-left"></div>
                    <div class="crop-corner bottom-right"></div>
                </div>
                <div id="scan-flash" class="scan-flash"></div>
            </div>
            <div id="status-pill" class="status-pill">Waiting…</div>
            <div id="error-bar" class="error-bar hidden">
                <span id="error-msg"></span>
                <button id="btn-retry" class="retry-btn">Retry</button>
                <button id="btn-skip" class="retry-btn skip-btn">Skip</button>
            </div>
            <div class="scan-info-row">
                <div id="page-counter" class="page-counter">Pages: 0</div>
                <button id="btn-new-doc" class="btn-new-doc">+ New Doc</button>
            </div>
            <div id="scan-preview" class="scan-preview hidden">
                <div class="scan-preview-text"></div>
            </div>
            <div class="scan-btn-row">
                <button id="btn-rescan" class="rescan-btn hidden">Rescan</button>
                <button id="btn-scan" class="scan-btn">Scan</button>
            </div>
        </section>

        <!-- Text View -->
        <section id="screen-text" class="screen view-screen">
            <div id="transcript-body" class="transcript-body">
                <p class="transcript-placeholder">Scanned pages will appear here…</p>
            </div>
            <div class="text-actions">
                <button id="btn-copy" class="btn-primary btn-small">Copy All</button>
                <button id="btn-save" class="btn-primary btn-small">Save</button>
                <button id="btn-clear" class="btn-secondary btn-small">Clear</button>
            </div>
        </section>

        <!-- Library View -->
        <section id="screen-library" class="screen view-screen">
            <div id="library-list" class="library-list">
                <p class="library-placeholder">No saved transcripts yet.</p>
            </div>
        </section>

    </div>

    <!-- Settings Modal (global) -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h2 class="modal-title">Settings</h2>

            <label class="input-label">OCR Provider:</label>
            <div class="provider-selector">
                <button class="provider-btn active" data-provider="claude">Claude</button>
                <button class="provider-btn" data-provider="gemini">Gemini</button>
                <button class="provider-btn" data-provider="gcv">Google Vision</button>
            </div>

            <div id="key-section-claude" class="key-section">
                <label for="api-key-claude" class="input-label">Claude API Key:</label>
                <input type="password" id="api-key-claude" class="text-input" placeholder="sk-ant-…">
            </div>
            <div id="key-section-gemini" class="key-section hidden">
                <label for="api-key-gemini" class="input-label">Gemini API Key:</label>
                <input type="password" id="api-key-gemini" class="text-input" placeholder="AIza…">
            </div>
            <div id="key-section-gcv" class="key-section hidden">
                <label for="api-key-gcv" class="input-label">Google Cloud API Key:</label>
                <input type="password" id="api-key-gcv" class="text-input" placeholder="AIza…">
            </div>

            <div class="modal-actions">
                <button id="btn-save-key" class="btn-primary btn-small">Save</button>
                <button id="btn-cancel-settings" class="btn-secondary btn-small">Cancel</button>
            </div>
            <p id="key-status" class="key-status"></p>
        </div>
    </div>

    <!-- Save Modal -->
    <div id="save-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h2 class="modal-title">Save Transcript</h2>
            <label for="save-name-input" class="input-label">Name:</label>
            <input type="text" id="save-name-input" class="text-input" placeholder="My story…" autocomplete="off">
            <div class="modal-actions">
                <button id="btn-confirm-save" class="btn-primary btn-small">Save</button>
                <button id="btn-cancel-save" class="btn-secondary btn-small">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
