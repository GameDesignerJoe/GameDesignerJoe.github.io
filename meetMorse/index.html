<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#3a241a" />
    <title>Meet Morse</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main id="app">
      <section id="home-screen" class="screen">
        <button
          id="settings-gear"
          class="settings-gear"
          type="button"
          aria-label="Settings"
        >⚙</button>
        <button id="play-nameplate" class="nameplate" type="button" aria-label="Play (free play)">
          <h1 class="nameplate-text">MEET MORSE</h1>
        </button>
        <button id="modes-button" class="play-button play-button-secondary" type="button">CHOOSE A MODE</button>
      </section>

      <section id="modes-screen" class="screen hidden">
        <div class="game-header">
          <button id="modes-back-button" class="back-button" type="button">← BACK</button>
          <span class="mode-label">MODES</span>
          <span class="header-spacer"></span>
        </div>
        <div id="modes-grid" class="modes-grid"></div>
      </section>

      <section id="settings-screen" class="screen hidden">
        <div class="game-header">
          <button id="settings-back-button" class="back-button" type="button">← BACK</button>
          <span class="mode-label">SETTINGS</span>
          <span class="header-spacer"></span>
        </div>
        <div id="settings-list" class="settings-list"></div>
      </section>

      <section id="game-screen" class="screen hidden">
        <div class="game-header">
          <button id="back-button" class="back-button" type="button">← BACK</button>
          <span class="mode-label">FREE PLAY</span>
          <span class="header-spacer"></span>
        </div>

        <div id="timed-status" class="timed-status hidden">
          <span class="timed-clock">0:00</span>
          <span class="timed-progress">word 1 of 10</span>
        </div>

        <div id="listening-status" class="listening-status hidden">
          <span class="listening-streak-current">streak <strong>0</strong></span>
          <span class="listening-streak-best">best <strong>0</strong></span>
        </div>

        <div id="word-display" class="word-display hidden"></div>

        <button id="replay-button" class="replay-button hidden" type="button">
          ↻&nbsp;&nbsp;REPLAY
        </button>

        <div id="paper-tape" class="paper-tape">
          <span class="tape-letters empty">start tapping…</span>
          <span class="tape-current">·—</span>
        </div>

        <div id="practice-content" class="practice-content hidden">
          <div id="practice-prompt" class="practice-prompt"></div>
          <div id="practice-visualizer" class="practice-visualizer">
            <div class="visualizer-target-zone"></div>
            <div class="visualizer-fill"></div>
            <div class="visualizer-threshold"></div>
          </div>
          <div class="practice-meta">
            <span id="practice-result" class="practice-result"></span>
            <span id="practice-streak" class="practice-streak">streak 0</span>
          </div>
        </div>

        <div id="tree-container" class="tree-container"></div>

        <div class="key-area">
          <button
            id="telegraph-key"
            class="telegraph-key"
            type="button"
            aria-label="Telegraph key"
          >
            <span class="key-label">TAP · HOLD</span>
          </button>
          <div class="key-base"></div>
        </div>

        <div id="debug-panel" class="debug-panel hidden">
          <div class="debug-header">
            <span>recent presses</span>
            <span class="debug-threshold-note" id="debug-threshold-note"></span>
          </div>
          <div id="debug-list" class="debug-list"></div>
        </div>
      </section>

      <section id="results-screen" class="screen hidden">
        <div class="results-content">
          <div id="results-new-high" class="results-new-high hidden">★ New High Score ★</div>
          <div id="results-headline" class="results-headline">0 WPM</div>
          <div id="results-stats" class="results-stats"></div>
          <div class="results-actions">
            <button id="results-again-button" class="play-button" type="button">PLAY AGAIN</button>
            <button id="results-back-button" class="modes-link" type="button">back to modes</button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
