<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Murmur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #07070f;  --s1:     #0f0f1c;  --s2:     #181828;  --s3:     #222236;
  --text:   #f0ede6;  --sub:    #928faa;  --mute:   #484660;
  --gold:   #c9a96e;  --gold10: rgba(201,169,110,0.10);  --gold25: rgba(201,169,110,0.25);
  --silk:   cubic-bezier(0.25,0.46,0.45,0.94);  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --r:20px; --rl:32px; --rxl:48px;
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

/* VIEWS */
.view{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity .35s var(--silk);z-index:1;}
.view.active{opacity:1;pointer-events:all;z-index:10;}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:80;
  padding:max(20px,env(safe-area-inset-top)) 24px 0;
  display:flex;align-items:center;justify-content:space-between;pointer-events:none;}
#nav>*{pointer-events:all;}
.wordmark{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:24px;letter-spacing:.08em;color:var(--text);}
.create-toggle{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);
  background:rgba(15,15,28,.7);backdrop-filter:blur(12px);border:1px solid var(--s3);
  border-radius:999px;padding:9px 18px;cursor:pointer;transition:all .25s var(--silk);}
.create-toggle:hover,.create-toggle.on{color:var(--gold);border-color:rgba(201,169,110,.4);background:var(--gold10);}

/* LIBRARY */
#view-library{overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;}
#view-library::-webkit-scrollbar{display:none;}
.s-card{position:relative;width:100%;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;overflow:hidden;cursor:pointer;}
.s-card-bg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.07);transition:transform 7s ease-out;will-change:transform;}
.s-card.in-view .s-card-bg{transform:scale(1);}
.s-card-vignette{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,7,15,.35) 0%,transparent 28%,rgba(7,7,15,.15) 55%,rgba(7,7,15,.88) 82%,rgba(7,7,15,.99) 100%);}
.s-card-body{position:absolute;bottom:0;left:0;right:0;padding:36px 28px max(36px,env(safe-area-inset-bottom));transform:translateY(6px);transition:transform .7s var(--silk);}
.s-card.in-view .s-card-body{transform:translateY(0);}
.s-tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.s-tag{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);background:var(--gold10);border:1px solid rgba(201,169,110,.22);border-radius:999px;padding:5px 13px;}
.s-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:clamp(36px,10vw,52px);line-height:1.04;color:var(--text);margin-bottom:10px;}
.s-tagline{font-size:14px;font-weight:300;color:var(--sub);line-height:1.55;margin-bottom:20px;}
.s-scroll-hint{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--mute);display:flex;align-items:center;gap:8px;}
.s-scroll-hint::before{content:'';display:block;width:20px;height:1px;background:var(--mute);}
.lib-dots{position:fixed;right:18px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:7px;z-index:50;}
.lib-dot{width:4px;height:4px;border-radius:2px;background:var(--mute);transition:all .35s var(--silk);}
.lib-dot.on{background:var(--gold);height:22px;}

/* DETAIL */
#view-detail{display:flex;flex-direction:column;background:var(--bg);
  transform:translateY(40px);transition:opacity .4s var(--silk),transform .45s var(--silk);
  overflow-y:auto;scrollbar-width:none;}
#view-detail.active{transform:translateY(0);}
#view-detail::-webkit-scrollbar{display:none;}
.d-hero{position:relative;width:100%;height:52dvh;flex-shrink:0;overflow:hidden;}
.d-hero-bg{position:absolute;inset:-12px;background-size:cover;background-position:center;}
.d-hero-vignette{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,7,15,.55) 0%,transparent 45%,rgba(7,7,15,.92) 80%,var(--bg) 100%);}
.d-back{position:absolute;top:max(18px,env(safe-area-inset-top));left:20px;width:44px;height:44px;border-radius:50%;
  background:rgba(7,7,15,.55);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:20px;z-index:10;transition:all .2s;}
.d-back:active{transform:scale(.92);}
.d-body{padding:0 28px max(48px,env(safe-area-inset-bottom));flex:1;}
.d-meta-row{display:flex;gap:20px;margin-bottom:20px;}
.d-meta-item{display:flex;flex-direction:column;gap:3px;}
.d-meta-label{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--mute);}
.d-meta-val{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--text);}
.d-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:clamp(34px,8vw,46px);line-height:1.05;color:var(--text);margin-bottom:6px;}
.d-tagline{font-size:15px;font-style:italic;font-weight:300;color:var(--gold);margin-bottom:18px;}
.d-desc{font-size:15px;font-weight:300;line-height:1.78;color:var(--sub);margin-bottom:36px;}
.btn-begin{width:100%;padding:20px;background:var(--gold);color:var(--bg);border:none;border-radius:var(--rl);
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;letter-spacing:.04em;cursor:pointer;transition:all .2s var(--silk);}
.btn-begin:active{transform:scale(.97);filter:brightness(.9);}

/* PLAYER */
#view-player{overflow:hidden;}
.p-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity 1.1s var(--silk);}
.p-bg-b{opacity:0;}
/* GIF backgrounds: use background-image so they animate natively */
.p-bg img.gif-layer{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.p-vignette{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,7,15,.5) 0%,rgba(7,7,15,.1) 35%,rgba(7,7,15,.4) 65%,rgba(7,7,15,.92) 100%);}
.p-top{position:absolute;top:0;left:0;right:0;z-index:20;padding:max(18px,env(safe-area-inset-top)) 20px 0;display:flex;align-items:center;justify-content:space-between;}
.p-close{width:42px;height:42px;border-radius:50%;background:rgba(7,7,15,.55);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sub);font-size:15px;transition:all .2s;}
.p-close:active{transform:scale(.9);}
.p-scene-chip{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(240,237,230,.55);background:rgba(7,7,15,.45);backdrop-filter:blur(10px);border-radius:999px;padding:7px 16px;}
.p-dots{display:flex;gap:5px;align-items:center;}
.p-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.18);transition:all .3s var(--silk);}
.p-dot.seen{background:var(--gold);}
.p-dot.here{background:#fff;transform:scale(1.35);}

/* Portrait */
.p-portrait-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);z-index:20;display:flex;flex-direction:column;align-items:center;gap:14px;}
.p-portrait{width:112px;height:112px;border-radius:50%;background:var(--s2);border:2px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:54px;overflow:hidden;transition:border-color .5s var(--silk),box-shadow .5s var(--silk),transform .4s var(--spring);}
.p-portrait img{width:100%;height:100%;object-fit:cover;}
.p-portrait.pop{transform:scale(1.08);}
.p-portrait.em-curious  {border-color:rgba(100,160,255,.55);box-shadow:0 0 32px rgba(100,160,255,.18);}
.p-portrait.em-afraid   {border-color:rgba(255,75,75,.55);  box-shadow:0 0 32px rgba(255,75,75,.18);}
.p-portrait.em-happy    {border-color:rgba(201,169,110,.65);box-shadow:0 0 32px rgba(201,169,110,.22);}
.p-portrait.em-sad      {border-color:rgba(140,100,210,.55);box-shadow:0 0 32px rgba(140,100,210,.18);}
.p-portrait.em-determined{border-color:rgba(255,255,255,.45);box-shadow:0 0 32px rgba(255,255,255,.12);}
.p-portrait-meta{display:flex;align-items:center;gap:10px;}
.p-emotion{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--sub);}
.waveform{display:flex;align-items:flex-end;gap:3px;height:16px;}
.wbar{width:3px;background:var(--gold);border-radius:2px;opacity:.75;animation:wave .9s ease-in-out infinite;}
.wbar:nth-child(1){height:5px; animation-delay:.00s;}
.wbar:nth-child(2){height:10px;animation-delay:.15s;}
.wbar:nth-child(3){height:16px;animation-delay:.30s;}
.wbar:nth-child(4){height:10px;animation-delay:.15s;}
.wbar:nth-child(5){height:5px; animation-delay:.05s;}
@keyframes wave{0%,100%{transform:scaleY(.25);}50%{transform:scaleY(1);}}

/* CHOICES */
.p-choices{position:absolute;bottom:0;left:0;right:0;z-index:20;padding:20px 20px max(32px,env(safe-area-inset-bottom));}
.choices-prompt{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--mute);text-align:center;margin-bottom:13px;opacity:0;transform:translateY(8px);transition:all .45s var(--silk);}
.choices-prompt.show{opacity:1;transform:translateY(0);}

/* Standard choice button */
.choice-btn{width:100%;padding:17px 22px;margin-bottom:10px;
  background:rgba(7,7,15,.52);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.075);border-radius:var(--rl);
  color:var(--text);font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:19px;font-weight:400;line-height:1.3;text-align:left;cursor:pointer;
  opacity:0;transform:translateY(22px);position:relative;overflow:hidden;
  transition:opacity .5s var(--silk),transform .5s var(--silk),background .2s,border-color .2s;}
.choice-btn.show{opacity:1;transform:translateY(0);}
.choice-btn:active{background:var(--gold10);border-color:var(--gold25);transform:scale(.978);}

/* Default choice — visually distinguished, has countdown */
.choice-btn.is-default{border-color:rgba(201,169,110,.28);background:rgba(7,7,15,.6);}
.choice-btn.is-default:active{transform:scale(.978);}
.choice-text{display:block;}
.default-meta{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
.default-label{font-family:'DM Sans',sans-serif;font-style:normal;font-size:10px;
  letter-spacing:.12em;text-transform:uppercase;color:var(--gold);opacity:.7;}
.default-secs{font-family:'DM Sans',sans-serif;font-style:normal;font-size:10px;
  letter-spacing:.08em;color:var(--gold);opacity:.6;min-width:20px;text-align:right;}
/* Countdown bar */
.countdown-track{position:absolute;bottom:0;left:0;right:0;height:2px;
  background:rgba(201,169,110,.1);border-radius:0 0 var(--rl) var(--rl);}
.countdown-fill{height:100%;width:100%;background:var(--gold);border-radius:inherit;transition:width .08s linear;}

/* CREATOR */
#view-creator{display:flex;flex-direction:column;}
.cr-header{height:58px;border-bottom:1px solid var(--s3);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;min-height:calc(58px + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);}
.cr-header-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;flex:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr-story-select{background:var(--s2);border:1px solid var(--s3);border-radius:999px;color:var(--sub);font-family:'DM Sans';font-size:11px;letter-spacing:.1em;padding:6px 12px;cursor:pointer;outline:none;appearance:none;max-width:140px;}
.cr-btn{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);background:var(--s2);border:1px solid var(--s3);border-radius:999px;padding:7px 14px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.cr-btn:hover{color:var(--text);border-color:var(--sub);}
.cr-btn.primary{color:var(--bg);background:var(--gold);border-color:var(--gold);}
.cr-layout{display:flex;flex:1;overflow:hidden;}
.cr-sidebar{width:210px;border-right:1px solid var(--s3);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.cr-sidebar-hd{padding:13px 15px 9px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.cr-add-inline{width:20px;height:20px;border-radius:50%;background:var(--s2);border:1px solid var(--s3);color:var(--sub);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.cr-list{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--s3) transparent;}
.cr-item{padding:11px 15px;cursor:pointer;border-bottom:1px solid var(--s2);transition:background .15s;}
.cr-item:hover{background:var(--s1);}
.cr-item.on{background:var(--gold10);border-left:2px solid var(--gold);}
.cr-item-name{font-size:13px;color:var(--text);margin-bottom:2px;}
.cr-item-meta{font-size:10px;color:var(--mute);}
.cr-canvas{flex:1;position:relative;overflow:auto;background-color:var(--bg);background-image:radial-gradient(circle,var(--s2) 1px,transparent 1px);background-size:30px 30px;}
.cr-canvas-inner{position:relative;min-width:1100px;min-height:750px;}
.cr-edges{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;}
.cr-node{position:absolute;width:185px;background:var(--s1);border:1px solid var(--s3);border-radius:var(--r);cursor:grab;transition:border-color .2s,box-shadow .2s;user-select:none;}
.cr-node:active{cursor:grabbing;}
.cr-node:hover{border-color:var(--sub);}
.cr-node.on{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold10);}
.cr-node.is-start{border-color:rgba(100,200,120,.5);}
.cr-node-hd{padding:10px 11px 7px;border-bottom:1px solid var(--s2);}
.cr-node-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px;}
.cr-node-em{font-size:10px;color:var(--mute);}
.cr-node-bd{padding:8px 11px 10px;}
.cr-node-clips{font-size:10px;color:var(--sub);margin-bottom:6px;}
.cr-node-choices{display:flex;flex-direction:column;gap:4px;}
.cr-node-choice{font-size:10px;color:var(--gold);background:var(--gold10);border-radius:6px;padding:3px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr-node-choice.is-def{border:1px solid rgba(201,169,110,.35);}
.cr-node-end{font-size:10px;color:var(--mute);font-style:italic;}
.cr-panel{width:290px;border-left:1px solid var(--s3);display:none;flex-direction:column;overflow:hidden;flex-shrink:0;}
.cr-panel.open{display:flex;}
.cr-panel-hd{padding:14px 15px;border-bottom:1px solid var(--s2);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--mute);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.cr-panel-close{cursor:pointer;color:var(--mute);font-size:18px;transition:color .15s;}
.cr-panel-close:hover{color:var(--text);}
.cr-panel-body{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--s3) transparent;}
.cr-field{padding:13px 15px;border-bottom:1px solid var(--s2);}
.cr-label{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);margin-bottom:8px;}
.cr-sublabel{font-size:10px;color:var(--mute);margin-bottom:6px;line-height:1.4;}
.cr-input{width:100%;background:var(--s2);border:1px solid var(--s3);border-radius:10px;padding:9px 11px;color:var(--text);font-family:'DM Sans';font-size:13px;outline:none;transition:border-color .2s;appearance:none;}
.cr-input:focus{border-color:var(--gold);}
.cr-input.sm{width:80px;flex:none;}
.cr-row{display:flex;gap:8px;margin-bottom:8px;}
.cr-clip-list{display:flex;flex-direction:column;gap:7px;margin-top:8px;}
.cr-clip{display:flex;align-items:center;gap:8px;background:var(--s2);border-radius:9px;padding:7px 10px;}
.cr-clip-name{flex:1;font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr-clip-del{color:var(--mute);cursor:pointer;font-size:15px;transition:color .15s;flex-shrink:0;}
.cr-clip-del:hover{color:#ff6b6b;}
.cr-choice-rows{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.cr-choice-row{background:var(--s2);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:6px;border:1px solid transparent;transition:border-color .2s;}
.cr-choice-row.is-default{border-color:rgba(201,169,110,.3);}
.cr-choice-row input,.cr-choice-row select{width:100%;background:var(--s3);border:1px solid rgba(255,255,255,.04);border-radius:7px;padding:7px 9px;color:var(--text);font-family:'DM Sans';font-size:12px;outline:none;appearance:none;}
.cr-choice-row input:focus,.cr-choice-row select:focus{border-color:var(--gold);}
.cr-choice-footer{display:flex;align-items:center;justify-content:space-between;margin-top:2px;}
.cr-choice-default-toggle{font-size:10px;letter-spacing:.08em;color:var(--gold);cursor:pointer;display:flex;align-items:center;gap:5px;}
.cr-choice-default-toggle input[type=radio]{accent-color:var(--gold);}
.cr-choice-del-btn{font-size:10px;color:var(--mute);cursor:pointer;transition:color .15s;}
.cr-choice-del-btn:hover{color:#ff6b6b;}
.cr-action-row{display:flex;flex-direction:column;gap:8px;padding:13px 15px;}
.cr-action{width:100%;padding:10px;border-radius:10px;border:1px solid var(--s3);background:var(--s2);color:var(--sub);font-family:'DM Sans';font-size:12px;cursor:pointer;transition:all .2s;text-align:center;}
.cr-action.start-flag{color:rgba(100,200,120,.9);border-color:rgba(100,200,120,.25);}
.cr-action.danger{color:#ff6b6b;border-color:rgba(255,107,107,.2);}
.cr-action:hover{border-color:var(--sub);color:var(--text);}

/* MODAL */
.modal-scrim{position:fixed;inset:0;background:rgba(7,7,15,.82);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s var(--silk);}
.modal-scrim.show{opacity:1;pointer-events:all;}
.modal-sheet{width:100%;background:var(--s1);border-radius:var(--rxl) var(--rxl) 0 0;border:1px solid var(--s3);border-bottom:none;padding:28px 26px max(36px,env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .45s var(--spring);}
.modal-scrim.show .modal-sheet{transform:translateY(0);}
.modal-handle{width:34px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 24px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:28px;margin-bottom:8px;}
.modal-sub{font-size:14px;font-weight:300;color:var(--sub);line-height:1.6;margin-bottom:28px;}
.modal-btns{display:flex;flex-direction:column;gap:10px;}
.modal-btn{padding:18px;border-radius:var(--r);border:1px solid var(--s3);background:var(--s2);color:var(--text);font-family:'DM Sans';font-size:15px;cursor:pointer;transition:all .2s;text-align:center;}
.modal-btn.gold{background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:500;}
.modal-btn:active{transform:scale(.97);}
#flash{position:fixed;inset:0;background:var(--bg);z-index:150;opacity:0;pointer-events:none;transition:opacity .28s var(--silk);}
#flash.on{opacity:1;}
</style>
</head>
<body>

<nav id="nav">
  <div class="wordmark">Murmur</div>
  <button class="create-toggle" id="create-toggle" onclick="toggleCreator()">✦ Create</button>
</nav>

<div class="view active" id="view-library"><div class="lib-dots" id="lib-dots"></div></div>

<div class="view" id="view-detail">
  <div class="d-hero">
    <div class="d-hero-bg" id="d-bg"></div>
    <div class="d-hero-vignette"></div>
    <button class="d-back" onclick="goLibrary()">‹</button>
  </div>
  <div class="d-body">
    <div class="s-tags" id="d-tags"></div>
    <div class="d-title" id="d-title"></div>
    <div class="d-tagline" id="d-tagline"></div>
    <div class="d-meta-row" id="d-meta"></div>
    <div class="d-desc" id="d-desc"></div>
    <button class="btn-begin" onclick="beginStory()">Begin Your Journey →</button>
  </div>
</div>

<div class="view" id="view-player">

// ── STATE ──────────────────────────────────────────────────
const S={view:'library',story:null,player:{story:null,sceneId:null,history:[],shufflers:{}},creator:{story:null,nodeId:null},_timers:[]};
function clearTimers(){S._timers.forEach(clearTimeout);S._timers=[];}
function after(ms,fn){const t=setTimeout(fn,ms);S._timers.push(t);return t;}
let _cdInterval=null;
function clearCd(){if(_cdInterval){clearInterval(_cdInterval);_cdInterval=null;}}

// ── SMART SHUFFLE ──────────────────────────────────────────
class SmartShuffle{
  constructor(c){this.orig=[...c];this.pool=[];this._fill();}
  _fill(){this.pool=[...this.orig].sort(()=>Math.random()-.5);}
  next(){if(!this.pool.length)this._fill();return this.pool.pop();}
}

// ── AUDIO ──────────────────────────────────────────────────
const AUD={
  narr:new Audio(),
  _ramp(el,from,to,ms,cb){el.volume=from;const steps=ms/16,delta=(to-from)/steps;let n=0;
    const tick=()=>{n++;el.volume=Math.min(1,Math.max(0,from+delta*n));if(n<steps)requestAnimationFrame(tick);else{el.volume=to;if(cb)cb();}};
    requestAnimationFrame(tick);},
  play(src,onEnd){this.narr.pause();this.narr.src=src;this.narr.volume=0;this.narr.onended=onEnd;
    this.narr.play().then(()=>this._ramp(this.narr,0,1,400)).catch(()=>setTimeout(onEnd,200));},
  stop(){this._ramp(this.narr,this.narr.volume,0,300,()=>{this.narr.pause();this.narr.onended=null;});}
};

// ── VIEWS ──────────────────────────────────────────────────
function setView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+id).classList.add('active');document.getElementById('nav').style.display=id==='player'?'none':'flex';S.view=id;}
function goLibrary(){setView('library');S.story=null;}

// ── LIBRARY ────────────────────────────────────────────────
// Library is initialized by the IIFE at the bottom of the script.

// ── DETAIL ─────────────────────────────────────────────────
function openDetail(story){
  S.story=story;
  applyBg(document.getElementById('d-bg'),story.bg,story.coverImage||null);
  document.getElementById('d-title').textContent=story.title;
  document.getElementById('d-tagline').textContent=story.tagline;
  document.getElementById('d-desc').textContent=story.description;
  document.getElementById('d-tags').innerHTML=story.tags.map(t=>`<span class="s-tag">${t}</span>`).join('');
  document.getElementById('d-meta').innerHTML=`<div class="d-meta-item"><span class="d-meta-label">Duration</span><span class="d-meta-val">${story.duration}</span></div><div class="d-meta-item"><span class="d-meta-label">Paths</span><span class="d-meta-val">${story.paths}</span></div><div class="d-meta-item"><span class="d-meta-label">Voice</span><span class="d-meta-val">${story.narrator.name}</span></div>`;
  setView('detail');
}

// Apply background — supports CSS gradient, image URL, or GIF
function applyBg(el,gradient,imageUrl){
  if(imageUrl){el.style.backgroundImage=`url(${imageUrl})`;el.style.background='';}
  else{el.style.background=gradient;el.style.backgroundImage='';}
}

// ── BEGIN / RESUME ─────────────────────────────────────────
function beginStory(){
  const story=S.story,saved=getSave(story.id);
  if(saved&&saved.sceneId&&saved.sceneId!==story.startScene){
    const sc=story.scenes[saved.sceneId];
    document.getElementById('modal-title').textContent='Welcome back';
    document.getElementById('modal-sub').textContent=`You left off at "${sc?sc.title:'a scene'}". Continue from there?`;
    document.getElementById('modal').classList.add('show');
  } else launchStory(story,story.startScene,[]);
}
function doResume(){const s=getSave(S.story.id);document.getElementById('modal').classList.remove('show');launchStory(S.story,s.sceneId,s.history);}
function doFresh(){clearSave(S.story.id);document.getElementById('modal').classList.remove('show');launchStory(S.story,S.story.startScene,[]);}
function getSave(id){try{return JSON.parse(localStorage.getItem('murmur_'+id));}catch{return null;}}
function putSave(id,d){localStorage.setItem('murmur_'+id,JSON.stringify(d));}
function clearSave(id){localStorage.removeItem('murmur_'+id);}

// ── PLAYER ─────────────────────────────────────────────────
let _bgSlot='a';

function launchStory(story,sceneId,history){
  S.player={story,sceneId,history:[...history],
    shufflers:Object.fromEntries(Object.values(story.scenes).map(sc=>[sc.id,new SmartShuffle(sc.clips)]))};
  setView('player');renderScene(sceneId,true);
}

function renderScene(sceneId,instant=false){
  clearTimers();clearCd();
  const{story,history,shufflers}=S.player,scene=story.scenes[sceneId];
  if(!scene)return;
  S.player.sceneId=sceneId;
  if(!history.includes(sceneId))history.push(sceneId);
  putSave(story.id,{sceneId,history});

  // Background crossfade — gradient, image, or GIF all handled by applyBg
  const ba=document.getElementById('p-bg-a'),bb=document.getElementById('p-bg-b');
  const grad=story.bgs[scene.bgKey]||story.bgs.a;
  if(instant){applyBg(ba,grad,scene.bgImage);ba.style.opacity='1';bb.style.opacity='0';_bgSlot='a';}
  else if(_bgSlot==='a'){applyBg(bb,grad,scene.bgImage);bb.style.opacity='1';ba.style.opacity='0';_bgSlot='b';}
  else{applyBg(ba,grad,scene.bgImage);ba.style.opacity='1';bb.style.opacity='0';_bgSlot='a';}

  // Scene chip + history dots
  document.getElementById('p-scene-chip').textContent=scene.title;
  document.getElementById('p-dots').innerHTML=Object.keys(story.scenes).map(id=>
    `<div class="p-dot ${history.includes(id)?'seen':''} ${id===sceneId?'here':''}"></div>`).join('');

  // Portrait — supports PNG/GIF portrait images per emotion or fallback emoji
  const port=document.getElementById('p-portrait');
  port.className='p-portrait em-'+scene.emotion;
  const portraitSrc=story.narrator.portraits?.[scene.emotion]||story.narrator.portraitImage||null;
  port.innerHTML=portraitSrc?`<img src="${portraitSrc}" alt="">`:story.narrator.emoji;
  port.classList.add('pop');after(400,()=>port.classList.remove('pop'));
  document.getElementById('p-emotion').textContent=scene.emotion;

  // Reset choices area, show waveform
  document.getElementById('p-choices').innerHTML='';
  document.getElementById('waveform').style.display='flex';

  // Audio playback
  const clip=shufflers[sceneId].next();
  let narrationEnded=false;
  const onNarrEnd=()=>{if(narrationEnded)return;narrationEnded=true;document.getElementById('waveform').style.display='none';};
  AUD.play(clip,onNarrEnd);

  const simMs=(scene.simDuration||12)*1000;
  const revealMs=Math.max(0,(scene.simDuration-(scene.secondsBeforeEnd||0))*1000);

  // PROTOTYPE: simulate waveform end & choice reveal via timers.
  // In production: replace with audio.addEventListener('timeupdate') to check
  // (audio.duration - audio.currentTime) <= scene.secondsBeforeEnd
  after(simMs,onNarrEnd);

  if(scene.choices.length>0&&scene.secondsBeforeEnd>0){
    after(revealMs,()=>revealChoices(scene));
  } else if(scene.choices.length===0){
    after(simMs,()=>revealChoices(scene));
  }
}

function revealChoices(scene){
  const el=document.getElementById('p-choices');
  el.innerHTML='';
  if(scene.choices.length===0){
    const p=document.createElement('div');p.className='choices-prompt';p.textContent='Your story ends here.';el.appendChild(p);
    requestAnimationFrame(()=>p.classList.add('show'));
    const btn=document.createElement('button');btn.className='choice-btn';btn.textContent='Return to the library…';btn.style.textAlign='center';btn.onclick=closePlayer;el.appendChild(btn);
    after(120,()=>btn.classList.add('show'));return;
  }
  const p=document.createElement('div');p.className='choices-prompt';p.textContent='What will you do?';el.appendChild(p);
  requestAnimationFrame(()=>p.classList.add('show'));

  const hasDefault=scene.defaultChoice!=null;
  const countdownMs=(scene.countdown||5)*1000;
  let chosen=false;
  const pick=(targetId)=>{if(chosen)return;chosen=true;clearCd();choose(targetId);};

  scene.choices.forEach((ch,i)=>{
    const isDef=hasDefault&&i===scene.defaultChoice;
    const btn=document.createElement('button');
    btn.className='choice-btn'+(isDef?' is-default':'');
    btn.innerHTML=`<span class="choice-text">${ch.text}</span>`+(isDef?
      `<div class="default-meta"><span class="default-label">Auto-selecting if no choice</span><span class="default-secs" id="def-secs">${scene.countdown||5}s</span></div>
       <div class="countdown-track"><div class="countdown-fill" id="def-bar"></div></div>`:'');
    btn.onclick=()=>pick(ch.target);
    el.appendChild(btn);
    after(100+i*85,()=>btn.classList.add('show'));
    if(isDef&&hasDefault) after(100+i*85,()=>startCountdown(countdownMs,()=>pick(ch.target)));
  });
}

function startCountdown(totalMs,onComplete){
  clearCd();
  const bar=()=>document.getElementById('def-bar');
  const secs=()=>document.getElementById('def-secs');
  let elapsed=0;const interval=80;
  _cdInterval=setInterval(()=>{
    elapsed+=interval;
    const pct=Math.max(0,1-elapsed/totalMs);
    if(bar())bar().style.width=(pct*100)+'%';
    if(secs())secs().textContent=Math.ceil(Math.max(0,totalMs-elapsed)/1000)+'s';
    if(elapsed>=totalMs){clearCd();onComplete();}
  },interval);
}

function choose(targetId){
  const flash=document.getElementById('flash');
  flash.style.transition='opacity .24s var(--silk)';flash.classList.add('on');
  after(240,()=>{flash.style.transition='opacity .5s var(--silk)';flash.classList.remove('on');renderScene(targetId);});
}

function closePlayer(){clearTimers();clearCd();AUD.stop();setView('library');}

// ── CREATOR ────────────────────────────────────────────────
function toggleCreator(){
  const btn=document.getElementById('create-toggle');
  if(S.view==='creator'){btn.classList.remove('on');setView('library');}
  else{btn.classList.add('on');if(!S.creator.story)S.creator.story=JSON.parse(JSON.stringify(STORIES[0]));populateCreatorSelect();renderCreator();setView('creator');}
}
function populateCreatorSelect(){
  const sel=document.getElementById('cr-story-select');
  sel.innerHTML=STORIES.map(s=>`<option value="${s.id}">${s.title}</option>`).join('');
  if(S.creator.story)sel.value=S.creator.story.id;
}
function loadCreatorStory(id){const f=STORIES.find(s=>s.id===id);if(f){S.creator.story=JSON.parse(JSON.stringify(f));S.creator.nodeId=null;renderCreator();}}
function renderCreator(){document.getElementById('cr-title').textContent=S.creator.story.title;renderSceneList();renderGraph();document.getElementById('cr-panel').classList.remove('open');}

function renderSceneList(){
  document.getElementById('cr-list').innerHTML=Object.values(S.creator.story.scenes).map(sc=>`
    <div class="cr-item ${S.creator.nodeId===sc.id?'on':''}" onclick="selectNode('${sc.id}')">
      <div class="cr-item-name">${sc.title}${sc.id===S.creator.story.startScene?' ★':''}</div>
      <div class="cr-item-meta">${sc.emotion} · ${sc.clips.length} clip${sc.clips.length!==1?'s':''} · reveal -${sc.secondsBeforeEnd||0}s · ${sc.countdown||0}s cd</div>
    </div>`).join('');
}

function renderGraph(){
  const story=S.creator.story,inner=document.getElementById('cr-inner');
  inner.querySelectorAll('.cr-node').forEach(n=>n.remove());
  document.getElementById('cr-edges').innerHTML='';
  const scenes=Object.values(story.scenes);
  if(!story._pos)story._pos={};
  scenes.forEach((sc,i)=>{if(!story._pos[sc.id])story._pos[sc.id]={x:40+(i%4)*215,y:50+Math.floor(i/4)*170};});
  scenes.forEach(sc=>{
    const{x,y}=story._pos[sc.id];
    const node=document.createElement('div');
    node.className=`cr-node ${S.creator.nodeId===sc.id?'on':''} ${sc.id===story.startScene?'is-start':''}`;
    node.id='nd-'+sc.id;node.style.cssText=`left:${x}px;top:${y}px`;
    node.innerHTML=`<div class="cr-node-hd"><div class="cr-node-title">${sc.title}${sc.id===story.startScene?' ★':''}</div>
      <div class="cr-node-em">${sc.emotion} · reveal -${sc.secondsBeforeEnd||0}s · ${sc.countdown||0}s countdown${sc.bgImage?' · 🖼':''}${sc.bgImage&&sc.bgImage.endsWith('.gif')?' GIF':''}</div></div>
      <div class="cr-node-bd"><div class="cr-node-clips">🔊 ${sc.clips.length} clip${sc.clips.length!==1?'s':''}</div>
      <div class="cr-node-choices">${sc.choices.map((c,i)=>`<div class="cr-node-choice${i===sc.defaultChoice?' is-def':''}">${i===sc.defaultChoice?'★ ':''}${c.text.slice(0,28)}${c.text.length>28?'…':''}</div>`).join('')}${sc.choices.length===0?'<div class="cr-node-end">End node</div>':''}</div></div>`;
    node.addEventListener('click',e=>{if(!e._dragged)selectNode(sc.id);});
    makeDraggable(node,sc.id);inner.appendChild(node);
  });
  requestAnimationFrame(drawEdges);
}

function drawEdges(){
  const story=S.creator.story,svg=document.getElementById('cr-edges');
  svg.innerHTML='';const NW=185,NH=118;
  Object.values(story.scenes).forEach(sc=>{
    const from=story._pos[sc.id];if(!from)return;
    sc.choices.forEach((ch,ci)=>{
      const to=story._pos[ch.target];if(!to)return;
      const x1=from.x+NW/2,y1=from.y+NH,x2=to.x+NW/2,y2=to.y;
      const dy=Math.abs(y2-y1)*.45;
      const sel=sc.id===S.creator.nodeId,isDef=ci===sc.defaultChoice;
      const stroke=sel?(isDef?'rgba(201,169,110,.8)':'rgba(201,169,110,.45)'):(isDef?'rgba(100,90,150,.6)':'rgba(55,53,85,.45)');
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M${x1},${y1} C${x1},${y1+dy} ${x2},${y2-dy} ${x2},${y2}`);
      path.setAttribute('fill','none');path.setAttribute('stroke',stroke);path.setAttribute('stroke-width',isDef?'2':'1.5');
      const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx',x2);dot.setAttribute('cy',y2);dot.setAttribute('r','3');dot.setAttribute('fill',stroke);
      svg.appendChild(path);svg.appendChild(dot);
    });
  });
}

function makeDraggable(el,sceneId){
  let down=false,sx,sy,ox,oy,moved=false;
  el.addEventListener('mousedown',e=>{down=true;moved=false;sx=e.clientX;sy=e.clientY;const p=S.creator.story._pos[sceneId];ox=p.x;oy=p.y;e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(!down)return;const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;const p=S.creator.story._pos[sceneId];p.x=ox+dx;p.y=oy+dy;el.style.left=p.x+'px';el.style.top=p.y+'px';drawEdges();});
  document.addEventListener('mouseup',e=>{if(down&&moved)e._dragged=true;down=false;});
}

function selectNode(id){
  S.creator.nodeId=id;
  document.querySelectorAll('.cr-node').forEach(n=>n.classList.remove('on'));
  document.getElementById('nd-'+id)?.classList.add('on');
  renderSceneList();drawEdges();openPanel(id);
}
function openPanel(id){document.getElementById('cr-panel').classList.add('open');renderPanel(id);}
function closePanel(){document.getElementById('cr-panel').classList.remove('open');S.creator.nodeId=null;renderSceneList();drawEdges();}

function renderPanel(id){
  const story=S.creator.story,sc=story.scenes[id];
  const others=Object.keys(story.scenes).filter(k=>k!==id);
  document.getElementById('cr-panel-body').innerHTML=`
    <div class="cr-field">
      <label class="cr-label">Scene Title</label>
      <input class="cr-input" value="${esc(sc.title)}" onchange="updScene('${id}','title',this.value)">
    </div>
    <div class="cr-field">
      <label class="cr-label">Emotion / Portrait State</label>
      <select class="cr-input" onchange="updScene('${id}','emotion',this.value)">
        ${['curious','happy','sad','afraid','determined'].map(e=>`<option${sc.emotion===e?' selected':''}>${e}</option>`).join('')}
      </select>
    </div>
    <div class="cr-field">
      <label class="cr-label">Background</label>
      <div class="cr-sublabel">Image or GIF URL (overrides gradient). GIFs loop automatically.</div>
      <input class="cr-input" style="margin-bottom:8px" value="${sc.bgImage||''}" placeholder="https://… or repo/path/to/scene.gif"
             onchange="updScene('${id}','bgImage',this.value.trim()||null)">
      <label class="cr-sublabel" style="margin-top:4px">Gradient fallback slot</label>
      <select class="cr-input" onchange="updScene('${id}','bgKey',this.value)">
        ${Object.keys(story.bgs).map(k=>`<option${sc.bgKey===k?' selected':''}>${k}</option>`).join('')}
      </select>
    </div>
    <div class="cr-field">
      <label class="cr-label">Choice Timing</label>
      <div class="cr-sublabel">Reveal choices this many seconds before clip ends. Player countdown: how long they have to pick before default fires.</div>
      <div class="cr-row">
        <div><div class="cr-sublabel">Reveal (s before end)</div>
          <input class="cr-input sm" type="number" min="0" value="${sc.secondsBeforeEnd||0}" onchange="updSceneN('${id}','secondsBeforeEnd',this.value)"></div>
        <div><div class="cr-sublabel">Player countdown (s)</div>
          <input class="cr-input sm" type="number" min="0" value="${sc.countdown||5}" onchange="updSceneN('${id}','countdown',this.value)"></div>
      </div>
    </div>
    <div class="cr-field">
      <label class="cr-label">Audio Clips <span style="color:var(--mute);font-size:10px;text-transform:none;letter-spacing:0">(smart shuffle — no repeat until all played)</span></label>
      <div class="cr-clip-list">${sc.clips.map((c,i)=>`<div class="cr-clip"><div class="cr-clip-name">${c}</div><span class="cr-clip-del" onclick="removeClip('${id}',${i})">×</span></div>`).join('')}</div>
      <input class="cr-input" style="margin-top:8px" id="clip-in" placeholder="path/to/clip.mp3" onkeydown="if(event.key==='Enter')addClip('${id}')">
    </div>
    <div class="cr-field">
      <label class="cr-label">Portrait Images <span style="color:var(--mute);font-size:10px;text-transform:none;letter-spacing:0">(per-emotion PNGs)</span></label>
      <div class="cr-sublabel">Set a URL for each emotion state. Leave blank to use emoji placeholder.</div>
      ${['curious','happy','sad','afraid','determined'].map(em=>`
        <div class="cr-sublabel" style="margin-top:6px">${em}</div>
        <input class="cr-input" style="margin-bottom:4px" value="${(story.narrator.portraits||{})[em]||''}" placeholder="portrait-${em}.png"
               onchange="updPortrait('${em}',this.value.trim()||null)">`).join('')}
    </div>
    <div class="cr-field">
      <label class="cr-label">Choices</label>
      <div class="cr-sublabel">★ = default (auto-fires when countdown ends)</div>
      <div class="cr-choice-rows">${sc.choices.map((ch,i)=>`
        <div class="cr-choice-row${i===sc.defaultChoice?' is-default':''}">
          <input placeholder="Choice text…" value="${esc(ch.text)}" onchange="updChoice('${id}',${i},'text',this.value)">
          <select onchange="updChoice('${id}',${i},'target',this.value)">
            ${others.map(oid=>`<option value="${oid}"${ch.target===oid?' selected':''}>${story.scenes[oid]?.title||oid}</option>`).join('')}
          </select>
          <div class="cr-choice-footer">
            <label class="cr-choice-default-toggle">
              <input type="radio" name="def-${id}" ${i===sc.defaultChoice?'checked':''} onchange="updSceneN('${id}','defaultChoice',${i})"> Default
            </label>
            <span class="cr-choice-del-btn" onclick="removeChoice('${id}',${i})">Remove</span>
          </div>
        </div>`).join('')}</div>
      <button class="cr-btn" style="margin-top:10px;width:100%" onclick="addChoice('${id}')">+ Add Choice</button>
    </div>
    <div class="cr-action-row">
      <button class="cr-action start-flag" onclick="setStart('${id}')">${story.startScene===id?'★ Start Scene':'Set as Start Scene'}</button>
      <button class="cr-action danger" onclick="deleteScene('${id}')">Delete Scene</button>
    </div>`;
}

function esc(s){return String(s).replace(/"/g,'&quot;');}
function updScene(id,k,v){S.creator.story.scenes[id][k]=v;renderSceneList();renderGraph();}
function updSceneN(id,k,v){S.creator.story.scenes[id][k]=isNaN(Number(v))?v:Number(v);renderSceneList();renderGraph();}
function updPortrait(em,v){if(!S.creator.story.narrator.portraits)S.creator.story.narrator.portraits={};S.creator.story.narrator.portraits[em]=v;renderGraph();}
function addClip(id){const inp=document.getElementById('clip-in');if(!inp.value.trim())return;S.creator.story.scenes[id].clips.push(inp.value.trim());inp.value='';openPanel(id);renderSceneList();}
function removeClip(id,i){S.creator.story.scenes[id].clips.splice(i,1);openPanel(id);renderSceneList();}
function addChoice(id){const others=Object.keys(S.creator.story.scenes).filter(k=>k!==id);S.creator.story.scenes[id].choices.push({text:'Choose…',target:others[0]||id});openPanel(id);renderGraph();}
function removeChoice(id,i){S.creator.story.scenes[id].choices.splice(i,1);openPanel(id);renderGraph();}
function updChoice(id,i,k,v){S.creator.story.scenes[id].choices[i][k]=v;renderGraph();}
function setStart(id){S.creator.story.startScene=id;openPanel(id);renderGraph();renderSceneList();}
function deleteScene(id){if(!confirm('Delete this scene?'))return;delete S.creator.story.scenes[id];if(S.creator.story._pos)delete S.creator.story._pos[id];Object.values(S.creator.story.scenes).forEach(sc=>{sc.choices=sc.choices.filter(c=>c.target!==id);});closePanel();renderCreator();}
function addScene(){const story=S.creator.story,id='scene_'+Date.now();story.scenes[id]={id,title:'New Scene',emotion:'curious',bgKey:'a',bgImage:null,clips:[],simDuration:12,secondsBeforeEnd:5,defaultChoice:0,countdown:4,choices:[]};if(!story._pos)story._pos={};const canvas=document.getElementById('cr-canvas');story._pos[id]={x:60+canvas.scrollLeft,y:60+canvas.scrollTop};renderSceneList();renderGraph();setTimeout(()=>selectNode(id),50);}
function exportStory(){const clean=JSON.parse(JSON.stringify(S.creator.story));delete clean._pos;const blob=new Blob([JSON.stringify(clean,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=clean.id+'.json';a.click();}

// ── BOOT ───────────────────────────────────────────────────
// Re-init library with working IntersectionObserver
(function(){
  const lib=document.getElementById('view-library'),dots=document.getElementById('lib-dots');
  STORIES.forEach((story,i)=>{
    const card=document.createElement('div');card.className='s-card';
    card.innerHTML=`<div class="s-card-bg" style="background:${story.bg}"></div><div class="s-card-vignette"></div>
      <div class="s-card-body"><div class="s-tags">${story.tags.map(t=>`<span class="s-tag">${t}</span>`).join('')}</div>
      <div class="s-title">${story.title}</div><div class="s-tagline">${story.tagline}</div>
      <div class="s-scroll-hint">${i<STORIES.length-1?'Scroll to explore':''}</div></div>`;
    card.onclick=()=>openDetail(story);lib.appendChild(card);
    const dot=document.createElement('div');dot.className='lib-dot'+(i===0?' on':'');dots.appendChild(dot);
  });
  const cards=lib.querySelectorAll('.s-card');
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in-view');const idx=[...cards].indexOf(e.target);document.querySelectorAll('.lib-dot').forEach((d,i)=>d.classList.toggle('on',i===idx));}else e.target.classList.remove('in-view');});},{threshold:.55,root:lib});
  cards.forEach(c=>obs.observe(c));
})();
</script>
