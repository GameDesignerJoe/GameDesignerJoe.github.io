<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Murmur Creator - ElevenLabs TTS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ffb4ab",
                        "on-secondary-container": "#b6b2ce",
                        "on-tertiary-fixed": "#410006",
                        "surface-dim": "#12121f",
                        "secondary-fixed-dim": "#c7c3e0",
                        "outline": "#998f81",
                        "secondary-container": "#46445c",
                        "on-background": "#e3e0f4",
                        "primary-fixed-dim": "#e4c285",
                        "tertiary-fixed-dim": "#ffb3b0",
                        "on-surface": "#e3e0f4",
                        "error-container": "#93000a",
                        "surface-bright": "#383847",
                        "primary-fixed": "#ffdea4",
                        "inverse-surface": "#e3e0f4",
                        "on-tertiary-container": "#840d1b",
                        "on-error": "#690005",
                        "primary": "#e6c487",
                        "tertiary-fixed": "#ffdad8",
                        "on-surface-variant": "#d0c5b5",
                        "on-secondary-fixed-variant": "#46445c",
                        "background": "#12121f",
                        "on-primary-container": "#543d0c",
                        "on-error-container": "#ffdad6",
                        "inverse-primary": "#745a27",
                        "secondary-fixed": "#e3dffd",
                        "on-secondary-fixed": "#1a192e",
                        "on-primary": "#412d00",
                        "on-tertiary": "#68000f",
                        "on-secondary": "#302e44",
                        "tertiary": "#ffb6b3",
                        "tertiary-container": "#ff8c89",
                        "surface-variant": "#343342",
                        "surface-tint": "#e4c285",
                        "primary-container": "#c9a96e",
                        "on-primary-fixed-variant": "#5a4312",
                        "surface-container-highest": "#343342",
                        "surface": "#12121f",
                        "surface-container-lowest": "#0d0d1a",
                        "surface-container-high": "#292937",
                        "inverse-on-surface": "#2f2f3d",
                        "secondary": "#c7c3e0",
                        "on-primary-fixed": "#261900",
                        "surface-container-low": "#1a1a28",
                        "surface-container": "#1e1e2c",
                        "outline-variant": "#4d463a",
                        "on-tertiary-fixed-variant": "#8c1520"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "body": ["Noto Serif"],
                        "label": ["Noto Serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scrim-blur {
            backdrop-filter: blur(10px);
            background-color: rgba(7, 7, 15, 0.85);
        }
        input[type="range"]::-webkit-slider-runnable-track {
            background: #12121f;
            height: 4px;
            border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #c9a96e;
            margin-top: -6px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(201, 169, 110, 0.4);
        }
    </style>
</head>
<body class="bg-[#07070f] font-body text-on-surface antialiased min-h-screen flex items-center justify-center p-4">
<!-- Background Content (Simulating the App Canvas) -->
<div class="fixed inset-0 z-0 overflow-hidden opacity-20 pointer-events-none">
<div class="absolute inset-0 grid grid-cols-[256px_1fr]">
<div class="border-r border-[#222236] h-full bg-[#0f0f1c]"></div>
<div class="h-full bg-[#07070f] flex items-center justify-center">
<div class="w-2/3 aspect-video border-2 border-dashed border-[#222236] rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-muted text-6xl">account_tree</span>
</div>
</div>
</div>
</div>
<!-- Modal Backdrop -->
<div class="fixed inset-0 z-[60] scrim-blur flex items-center justify-center p-4 overflow-y-auto">
<!-- Modal Dialog -->
<div class="bg-[#0f0f1c] w-full max-w-[560px] rounded-[16px] border border-[#222236] shadow-2xl overflow-hidden my-8">
<!-- Header -->
<div class="px-8 pt-8 pb-4 flex justify-between items-center">
<h2 class="text-2xl italic font-headline text-on-surface">ElevenLabs TTS</h2>
<button class="text-muted hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<!-- Content Container -->
<div class="px-8 pb-8 space-y-8">
<!-- API KEY Section -->
<section>
<label class="block text-[13px] uppercase tracking-widest text-[#928faa] mb-3">API KEY</label>
<div class="flex gap-3">
<div class="relative flex-1">
<input class="w-full bg-[#12121f] border border-[#222236] rounded-lg px-4 py-2.5 text-on-surface focus:outline-none focus:border-primary-container transition-colors" type="password" value="••••••••••••••••••••••••"/>
<span class="material-symbols-outlined absolute right-3 top-2.5 text-muted text-xl cursor-pointer">visibility</span>
</div>
<button class="bg-[#c9a96e] text-[#412d00] font-bold px-5 py-2.5 rounded-full text-sm hover:brightness-110 transition-all shadow-lg">Load Voices</button>
</div>
</section>
<!-- VOICE Section -->
<section>
<label class="block text-[13px] uppercase tracking-widest text-[#928faa] mb-3">VOICE</label>
<div class="space-y-3">
<div class="relative group">
<select class="w-full appearance-none bg-[#12121f] border border-[#222236] rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary-container cursor-pointer">
<option>Marcus — Deep &amp; Warm</option>
<option>Antoni — Narrator</option>
<option>Bella — Soft &amp; Clear</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-3 text-muted pointer-events-none group-hover:text-primary transition-colors">expand_more</span>
</div>
<button class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-[#222236] bg-[#181828] text-sm text-[#f0ede6] hover:bg-[#222236] transition-colors">
<span class="material-symbols-outlined text-lg">play_arrow</span>
                            Preview Voice
                        </button>
</div>
</section>
<!-- NARRATION SOURCE Section -->
<section>
<label class="block text-[13px] uppercase tracking-widest text-[#928faa] mb-3">NARRATION SOURCE</label>
<div class="space-y-4">
<div class="border-2 border-dashed border-[#222236] bg-[#12121f]/50 rounded-xl p-8 flex flex-col items-center justify-center group cursor-pointer hover:border-primary-container transition-colors">
<span class="material-symbols-outlined text-4xl text-muted mb-2 group-hover:text-primary transition-colors">upload_file</span>
<p class="text-on-surface text-sm">Drop CSV or <span class="text-primary cursor-pointer">click to browse</span></p>
</div>
<div class="bg-[#181828] border-l-4 border-green-500/50 p-4 rounded-r-lg flex items-center gap-3">
<span class="material-symbols-outlined text-green-400">check_circle</span>
<span class="text-sm text-on-surface">24 scenes with narration scripts found</span>
</div>
</div>
</section>
<!-- GENERATION SETTINGS Section -->
<section>
<label class="block text-[13px] uppercase tracking-widest text-[#928faa] mb-3">GENERATION SETTINGS</label>
<div class="space-y-6">
<div class="relative group">
<label class="block text-xs text-muted mb-2">MODEL</label>
<select class="w-full appearance-none bg-[#12121f] border border-[#222236] rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-primary-container cursor-pointer">
<option>Eleven Multilingual v2</option>
<option>Eleven English v1</option>
<option>Eleven Turbo v2.5</option>
</select>
<span class="material-symbols-outlined absolute right-4 bottom-3 text-muted pointer-events-none group-hover:text-primary transition-colors">expand_more</span>
</div>
<div class="grid grid-cols-2 gap-8">
<div class="space-y-3">
<div class="flex justify-between">
<label class="text-xs text-muted uppercase">Stability</label>
<span class="text-xs text-primary">0.5</span>
</div>
<input class="w-full accent-primary bg-transparent cursor-pointer" max="1" min="0" step="0.01" type="range" value="0.5"/>
</div>
<div class="space-y-3">
<div class="flex justify-between">
<label class="text-xs text-muted uppercase">Similarity</label>
<span class="text-xs text-primary">0.75</span>
</div>
<input class="w-full accent-primary bg-transparent cursor-pointer" max="1" min="0" step="0.01" type="range" value="0.75"/>
</div>
</div>
</div>
</section>
<!-- PROGRESS Section -->
<section class="space-y-3">
<div class="flex justify-between items-end">
<div>
<p class="text-sm text-on-surface font-medium">Generating scene 8 of 24 — the_hiding...</p>
<p class="text-[11px] text-[#706c8a] mt-0.5">8 complete · 0 errors</p>
</div>
<span class="text-xs text-primary font-bold">33%</span>
</div>
<div class="w-full h-1.5 bg-[#12121f] rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-1/3 rounded-full shadow-[0_0_8px_rgba(201,169,110,0.5)]"></div>
</div>
</section>
<!-- Footer Action -->
<div class="pt-4">
<button class="w-full bg-[#c9a96e] text-[#412d00] font-bold py-4 rounded-lg hover:brightness-105 transition-all shadow-[0_4px_20px_rgba(201,169,110,0.2)] flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">settings_voice</span>
                        Generate All Audio
                    </button>
</div>
</div>
</div>
</div>
<!-- Image Prompts (Reference for UI background or decorative elements) -->

<!-- <img src="image-2.jpg" data-alt="minimalist wave pattern of audio frequencies moving across a dark screen in glowing gold and deep purple tones"> -->
</body></html>
