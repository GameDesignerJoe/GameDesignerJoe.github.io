<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .mask-vignette {
      mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body overflow-hidden h-screen w-full select-none">
<!-- Immersive Canvas Background -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-b from-background via-transparent to-background z-10 opacity-60"></div>
<img class="w-full h-full object-cover grayscale opacity-40 brightness-50" data-alt="dramatic cinematic portrait of a mysterious traveler in a hooded cloak standing in a moonlit foggy forest clearing" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA_Y5Rt8hLz2EnUMDkM9CWW0d71zXcTts-G0vgFi2Gzwek1WphuISqCAl-IWsmJEGrqm56PYcevyBDlnAu4R2EsKPL1PCCypXCAn_Amsj6Ye3HLFV8X_H78c-BrJqFNPGFD01Ai8BdLsPdiB1wt0pCyIhH77PCzWgnPCIosA-b9d-ILKaZyx5l9Uq7O3lm6mZQCv6x4O6QyCx5NB5c8L_SL9hwka_qbBVQgHd-lFFCBk0eCk6BypY3UBS8KWHmZy28pIrHrCVdtu-c"/>
</div>
<!-- Shared Component: TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-transparent">
<button class="text-[#c9a96e] brightness-125 opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline italic tracking-wide text-2xl text-[#c9a96e]">Murmur</h1>
<button class="text-[#c9a96e] brightness-125 opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Player Content (Dimmed) -->
<main class="relative z-20 h-full flex flex-col justify-end pb-24 px-8 opacity-40 grayscale-[0.5] blur-[1px]">
<div class="max-w-2xl mx-auto w-full space-y-8">
<!-- Audio Visualization Waveform -->
<div class="flex items-center justify-center space-x-1 h-12 mb-8">
<div class="w-1 bg-primary/20 h-4 rounded-full"></div>
<div class="w-1 bg-primary/30 h-8 rounded-full"></div>
<div class="w-1 bg-primary/40 h-10 rounded-full"></div>
<div class="w-1 bg-primary/50 h-6 rounded-full"></div>
<div class="w-1 bg-primary/40 h-12 rounded-full"></div>
<div class="w-1 bg-primary/30 h-8 rounded-full"></div>
<div class="w-1 bg-primary/20 h-4 rounded-full"></div>
</div>
<div class="space-y-4">
<p class="font-headline italic text-xl leading-relaxed text-on-surface/90">
          "The path splits here, traveler. One leads to the whispering caves, the other to the sun-scorched dunes. Both hold secrets, but only one holds your salvation."
        </p>
</div>
<div class="grid gap-4 mt-8">
<button class="w-full py-4 px-6 rounded-xl bg-surface-container-high/40 backdrop-blur-md border border-outline-variant/30 text-left flex items-center justify-between group">
<span class="text-on-surface">Enter the Whispering Caves</span>
<span class="material-symbols-outlined text-primary/50" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full py-4 px-6 rounded-xl bg-surface-container-high/40 backdrop-blur-md border border-outline-variant/30 text-left flex items-center justify-between group">
<span class="text-on-surface">Cross the Sun-Scorched Dunes</span>
<span class="material-symbols-outlined text-primary/50" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
</main>
<!-- PAUSED OVERLAY (The Requested Task) -->
<div class="fixed inset-0 z-40 bg-[#07070f]/70 backdrop-blur-sm flex flex-col items-center justify-center">
<!-- Decorative Gold Accents -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-primary/5 rounded-full blur-[80px]"></div>
<div class="relative text-center space-y-6">
<div class="flex justify-center mb-4">
<div class="w-16 h-16 rounded-full border border-primary/30 flex items-center justify-center bg-primary/5">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
</div>
<h2 class="text-6xl md:text-8xl font-headline italic tracking-widest text-[#c9a96e] drop-shadow-[0_0_15px_rgba(201,169,110,0.3)]">
        PAUSED
      </h2>
<div class="flex flex-col items-center space-y-2">
<p class="text-[#c9a96e]/60 font-label uppercase tracking-[0.3em] text-xs">
          Tap to Resume
        </p>
<div class="w-8 h-[1px] bg-gradient-to-r from-transparent via-[#c9a96e]/40 to-transparent"></div>
</div>
</div>
<!-- Playback Status Info -->
<div class="absolute bottom-32 w-full flex flex-col items-center space-y-1">
<p class="text-on-surface/40 text-sm font-label">Chapter IV: The Echoing Threshold</p>
<p class="text-on-surface/20 text-xs">12:45 / 24:00</p>
</div>
</div>
<!-- Shared Component: BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 h-16 bg-[#07070f]/80 backdrop-blur-md border-t border-[#c9a96e]/10 shadow-2xl">
<button class="flex flex-col items-center justify-center text-[#c9a96e]/40 hover:text-[#c9a96e]/80 transition-all">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
</button>
<button class="flex flex-col items-center justify-center text-[#c9a96e] scale-110">
<span class="material-symbols-outlined" data-icon="explore" style="font-variation-settings: 'FILL' 1;">explore</span>
</button>
<button class="flex flex-col items-center justify-center text-[#c9a96e]/40 hover:text-[#c9a96e]/80 transition-all">
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
</button>
<button class="flex flex-col items-center justify-center text-[#c9a96e]/40 hover:text-[#c9a96e]/80 transition-all">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</nav>
</body></html>
