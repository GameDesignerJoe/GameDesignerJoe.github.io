<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar Scale Generator</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Guitar Scale Generator</h1>
    </header>

    <div class="top-bar">
      <div class="dropdown">
        <button id="btn-export" class="dropdown-toggle">Export</button>
        <div class="dropdown-menu" id="export-menu">
          <button id="btn-copy">Copy Image</button>
          <button id="btn-png">Download PNG</button>
          <button id="btn-print">Print / PDF</button>
          <button id="btn-share">Share URL</button>
        </div>
      </div>
    </div>

    <div id="boards-container"></div>

    <button id="btn-add-board" class="add-board-btn">+ Add Fretboard</button>

    <div id="toast" class="toast" hidden></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
