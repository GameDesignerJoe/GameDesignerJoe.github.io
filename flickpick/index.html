<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flickpick</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #e8c547;
    --accent2: #7b6cf6;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --seen: #4ade80;
    --want: #e8c547;
    --danger: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 60px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .nav-links {
    display: flex;
    gap: 4px;
  }

  .nav-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .nav-btn.active {
    color: var(--text);
    background: var(--surface2);
  }

  .nav-btn:hover:not(.active) {
    color: var(--text);
  }

  .want-count {
    position: absolute;
    top: 4px; right: 6px;
    background: var(--accent);
    color: #000;
    font-size: 9px;
    font-weight: 700;
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .want-count.visible { opacity: 1; }

  /* PAGES */
  .page {
    display: none;
    padding-top: 60px;
    min-height: 100vh;
  }
  .page.active { display: block; }

  /* DISCOVER PAGE */
  .search-hero {
    padding: 60px 32px 40px;
    max-width: 720px;
    margin: 0 auto;
  }

  .search-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .search-wrapper {
    position: relative;
    display: flex;
    gap: 12px;
  }

  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
  }

  .search-input::placeholder { color: var(--muted); }

  .search-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 16px 28px;
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .search-btn:hover { background: #f5d060; transform: translateY(-1px); }
  .search-btn:disabled { opacity: 0.5; cursor: wait; transform: none; }

  /* FEATURED RESULT */
  .featured-section {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 32px 60px;
    display: none;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    margin-bottom: 16px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .back-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
  }

  .featured-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 200px 1fr;
    margin-bottom: 48px;
    position: relative;
  }

  .featured-poster {
    width: 200px;
    height: 280px;
    object-fit: cover;
    display: block;
  }

  .featured-poster-placeholder {
    width: 200px;
    height: 280px;
    background: var(--surface2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .poster-emoji { font-size: 40px; }

  .featured-info {
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .featured-type {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }

  .featured-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 1;
    letter-spacing: 1px;
  }

  .featured-meta {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .featured-desc {
    font-size: 14px;
    line-height: 1.7;
    color: #b0b0c0;
    flex: 1;
  }

  .featured-extras {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .trailer-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: rgba(255, 0, 0, 0.12);
    border: 1px solid rgba(255, 0, 0, 0.35);
    border-radius: 8px;
    color: #ff4444;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .trailer-btn:hover {
    background: rgba(255, 0, 0, 0.25);
    border-color: #ff4444;
  }

  .watch-providers {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .watch-providers-link {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }

  .provider-link {
    display: inline-block;
    text-decoration: none;
    line-height: 0;
  }

  .providers-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .provider-logo {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    object-fit: cover;
    transition: transform 0.15s;
  }

  .provider-logo:hover {
    transform: scale(1.15);
  }

  .similar-trailer {
    padding: 0 14px 8px;
  }

  .mini-trailer-btn {
    width: 100%;
    text-align: center;
  }

  .mini-trailer-btn {
    background: rgba(255, 0, 0, 0.1);
    border: 1px solid rgba(255, 0, 0, 0.3);
    border-radius: 6px;
    color: #ff4444;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mini-trailer-btn:hover {
    background: rgba(255, 0, 0, 0.2);
    border-color: #ff4444;
  }

  /* Trailer modal */
  .trailer-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .trailer-modal-backdrop {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
  }

  .trailer-modal-content {
    position: relative;
    width: 90vw;
    max-width: 900px;
    aspect-ratio: 16/9;
  }

  .trailer-modal-content iframe {
    width: 100%;
    height: 100%;
    border-radius: 12px;
  }

  .trailer-modal-close {
    position: absolute;
    top: -40px;
    right: 0;
    background: none;
    border: none;
    color: #fff;
    font-size: 32px;
    cursor: pointer;
    padding: 4px 12px;
    line-height: 1;
  }

  .trailer-modal-close:hover {
    color: #ff4444;
  }

  .featured-actions {
    display: flex;
    gap: 10px;
    margin-top: auto;
    padding-top: 8px;
  }

  .btn-seen, .btn-want, .btn-nope {
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-seen {
    background: rgba(74, 222, 128, 0.1);
    border: 1px solid rgba(74, 222, 128, 0.3);
    color: var(--seen);
  }
  .btn-seen:hover, .btn-seen.active {
    background: rgba(74, 222, 128, 0.2);
    border-color: var(--seen);
  }
  .btn-seen.active { background: var(--seen); color: #000; }

  .btn-want {
    background: rgba(232, 197, 71, 0.1);
    border: 1px solid rgba(232, 197, 71, 0.3);
    color: var(--want);
  }
  .btn-want:hover, .btn-want.active {
    background: rgba(232, 197, 71, 0.2);
    border-color: var(--want);
  }
  .btn-want.active { background: var(--want); color: #000; }

  /* SIMILAR SECTION */
  .similar-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .similar-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .similar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }

  .similar-card:hover {
    border-color: var(--accent2);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .similar-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
  }

  .similar-poster-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--surface2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    font-size: 28px;
  }

  .similar-body {
    padding: 14px;
  }

  .similar-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .similar-subtitle {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .similar-actions {
    display: flex;
    gap: 6px;
    padding: 0 14px 14px;
  }

  .mini-btn {
    flex: 1;
    padding: 7px 8px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    text-align: center;
  }

  .mini-seen {
    background: rgba(74, 222, 128, 0.08);
    border: 1px solid rgba(74, 222, 128, 0.25);
    color: var(--seen);
  }
  .mini-seen:hover { background: rgba(74, 222, 128, 0.18); }
  .mini-seen.active { background: var(--seen); color: #000; border-color: var(--seen); }

  .mini-want {
    background: rgba(232, 197, 71, 0.08);
    border: 1px solid rgba(232, 197, 71, 0.25);
    color: var(--want);
  }
  .mini-want:hover { background: rgba(232, 197, 71, 0.18); }
  .mini-want.active { background: var(--want); color: #000; border-color: var(--want); }

  .btn-nope {
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    color: var(--danger);
  }
  .btn-nope:hover, .btn-nope.active {
    background: rgba(248, 113, 113, 0.2);
    border-color: var(--danger);
  }
  .btn-nope.active { background: var(--danger); color: #000; }

  .mini-nope {
    background: rgba(248, 113, 113, 0.08);
    border: 1px solid rgba(248, 113, 113, 0.25);
    color: var(--danger);
  }
  .mini-nope:hover { background: rgba(248, 113, 113, 0.18); }
  .mini-nope.active { background: var(--danger); color: #000; border-color: var(--danger); }

  .similar-card.removing {
    animation: fadeOut 0.3s ease forwards;
  }
  @keyframes fadeOut {
    to { opacity: 0; transform: scale(0.95); }
  }

  .similar-card.swapping-in {
    animation: swapIn 0.3s ease forwards;
  }
  @keyframes swapIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .similar-card.loading-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 280px;
    cursor: default;
  }
  .similar-card.loading-placeholder:hover {
    transform: none;
    border-color: var(--border);
    box-shadow: none;
  }
  .similar-card.loading-placeholder .loading-spinner {
    width: 24px; height: 24px;
    margin: 0;
  }

  /* RATING BUTTONS */
  .rating-btns {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .rating-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    padding: 4px 8px;
    font-size: 18px;
    transition: all 0.2s;
    opacity: 0.4;
  }
  .rating-btn:hover { opacity: 0.8; }
  .rating-btn.active-loved {
    opacity: 1;
    background: rgba(248, 113, 113, 0.12);
    border-color: rgba(248, 113, 113, 0.4);
  }
  .rating-btn.active-liked {
    opacity: 1;
    background: rgba(74, 222, 128, 0.12);
    border-color: rgba(74, 222, 128, 0.4);
  }
  .rating-btn.active-disliked {
    opacity: 1;
    background: rgba(107, 107, 128, 0.2);
    border-color: rgba(107, 107, 128, 0.4);
  }

  .seen-count {
    position: absolute;
    top: 4px; right: 6px;
    background: var(--seen);
    color: #000;
    font-size: 9px;
    font-weight: 700;
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .seen-count.visible { opacity: 1; }

  /* LOADING */
  .loading-state {
    text-align: center;
    padding: 60px 32px;
    color: var(--muted);
    display: none;
  }

  .loading-spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* WANT PAGE */
  .want-page-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 32px;
  }

  .page-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .page-subheading {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
    margin-bottom: 40px;
  }

  .want-empty {
    text-align: center;
    padding: 80px 32px;
    color: var(--muted);
  }

  .want-empty-icon { font-size: 48px; margin-bottom: 16px; }
  .want-empty-text { font-size: 15px; }

  .want-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .want-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 16px 20px;
    transition: all 0.2s;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .want-item:hover { border-color: var(--border); background: var(--surface2); }

  .want-item-emoji { font-size: 28px; flex-shrink: 0; }

  .want-item-info { flex: 1; min-width: 0; }

  .want-item-title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .want-item-meta {
    font-size: 12px;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .want-item-type {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    padding: 4px 10px;
    background: rgba(232, 197, 71, 0.08);
    border-radius: 20px;
    flex-shrink: 0;
  }

  .btn-remove {
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    padding: 6px 10px;
    font-size: 12px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-remove:hover {
    border-color: var(--danger);
    color: var(--danger);
    background: rgba(248, 113, 113, 0.08);
  }

  /* WATCHLIST CARDS */
  .watchlist-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .watchlist-card {
    display: grid;
    grid-template-columns: 160px 1fr;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.2s;
    animation: slideIn 0.3s ease;
  }

  .watchlist-card:hover {
    border-color: var(--accent2);
    background: var(--surface2);
  }

  .watchlist-poster {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .watchlist-poster-placeholder {
    width: 100%;
    min-height: 180px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }

  .watchlist-info {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .watchlist-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .watchlist-title {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.3;
  }

  .watchlist-type {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    padding: 3px 8px;
    background: rgba(232, 197, 71, 0.08);
    border-radius: 20px;
    flex-shrink: 0;
  }

  .watchlist-meta {
    font-size: 12px;
    color: var(--muted);
  }

  .watchlist-desc {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    opacity: 0.8;
  }

  .watchlist-extras {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: auto;
  }

  .watchlist-actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .btn-load-more {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-load-more:hover {
    background: var(--surface2);
    border-color: var(--accent);
  }

  /* DISCOVER CAROUSELS */
  .discover-carousels {
    max-width: 700px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .carousel-section {
    margin-bottom: 24px;
  }

  .carousel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .carousel-label {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .carousel-nav {
    display: flex;

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  seen: {},   // id -> item
  want: {},   // id -> item
  nope: {},   // id -> item
};

let currentFeatured = null;
let shownIds = new Set();
let replacementBuffer = [];
let bufferFetching = false;
const GRID_SIZE = 4;
const BUFFER_LOW = 3;
const viewHistory = []; // stack of { featured, similarHtml, buffer, shownIds }

// ─── TMDB CACHE ─────────────────────────────────────────────────────────────
const posterCache = {};
const tmdbIdCache = {};

async function fetchPoster(title, year) {
  const cacheKey = `${title}::${year || ''}`;
  if (posterCache[cacheKey] !== undefined) return posterCache[cacheKey];

  try {
    let tmdbUrl = `/api/tmdb?query=${encodeURIComponent(title)}`;
    if (year) tmdbUrl += `&year=${year}`;
    const res = await fetch(tmdbUrl);
    const data = await res.json();

    if (data.results && data.results.length > 0) {
      const match = data.results.find(r =>
        (r.title || r.name || '').toLowerCase() === title.toLowerCase()
      ) || data.results[0];

      // Cache TMDB ID + media type for trailer/provider lookups
      if (match.id && match.media_type) {
        tmdbIdCache[cacheKey] = { tmdbId: match.id, mediaType: match.media_type };
      }

      if (match.poster_path) {
        const url = `https://image.tmdb.org/t/p/w342${match.poster_path}`;
        posterCache[cacheKey] = url;
        return url;
      }
    }
    posterCache[cacheKey] = null;
    return null;
  } catch (err) {
    console.warn('TMDB lookup failed:', err.message);
    posterCache[cacheKey] = null;
    return null;
  }
}

function getTmdbInfo(title, year) {
  return tmdbIdCache[`${title}::${year || ''}`] || null;
}

function loadPosterFor(itemId, title, year) {
  fetchPoster(title, year).then(url => {
    if (!url) return;
    const el = document.querySelector(`[data-poster-id="${itemId}"]`);
    if (!el) return;
    const img = document.createElement('img');
    img.src = url;
    img.alt = title;
    const isFeatured = el.classList.contains('featured-poster-placeholder');
    img.className = isFeatured ? 'featured-poster' : 'similar-poster';
    if (!isFeatured) {
      img.style.cursor = 'pointer';
      const onclickAttr = el.getAttribute('onclick');
      if (onclickAttr) img.setAttribute('onclick', onclickAttr);
    }
    img.onload = () => el.replaceWith(img);
  });
}

// ─── TMDB EXTRAS (TRAILERS + PROVIDERS) ─────────────────────────────────────
const tmdbExtrasCache = {};

async function fetchTmdbExtras(title, year) {
  const cacheKey = `${title}::${year || ''}`;
  if (tmdbExtrasCache[cacheKey]) return tmdbExtrasCache[cacheKey];

  // Ensure poster search has run (populates tmdbIdCache)
  await fetchPoster(title, year);
  const info = getTmdbInfo(title, year);
  if (!info) return { trailerKey: null, providers: [], watchLink: null };

  try {
    const res = await fetch(`/api/tmdb-details?id=${info.tmdbId}&type=${info.mediaType}`);
    const data = await res.json();

    // Find best trailer — prefer official trailers
    let trailerKey = null;
    if (data.videos && data.videos.results) {
      const trailer = data.videos.results.find(v =>
        v.type === 'Trailer' && v.site === 'YouTube'
      ) || data.videos.results.find(v => v.site === 'YouTube');
      if (trailer) trailerKey = trailer.key;
    }

    // Get US streaming providers (flatrate = subscription services)
    let providers = [];
    let watchLink = null;
    if (data['watch/providers'] && data['watch/providers'].results) {
      const us = data['watch/providers'].results.US;
      if (us) {
        watchLink = us.link || null;
        if (us.flatrate) {
          providers = us.flatrate.map(p => ({
            name: p.provider_name,
            logo: `https://image.tmdb.org/t/p/w45${p.logo_path}`
          }));
        }
      }
    }

    const result = { trailerKey, providers, watchLink };
    tmdbExtrasCache[cacheKey] = result;
    return result;
  } catch (err) {
    console.warn('TMDB extras fetch failed:', err.message);
    return { trailerKey: null, providers: [], watchLink: null };
  }
}

// ─── STREAMING AVAILABILITY (DIRECT LINKS) ──────────────────────────────────
const streamingCache = {};
const STREAMING_CACHE_KEY = 'flickpick_streaming_cache';
const STREAMING_CACHE_TTL = 7 * 24 * 60 * 60 * 1000; // 7 days

// Load persistent cache from localStorage on startup
(function loadStreamingCache() {
  try {
    const stored = localStorage.getItem(STREAMING_CACHE_KEY);
    if (stored) {
      const parsed = JSON.parse(stored);
      const now = Date.now();
      for (const key in parsed) {
        if (now - parsed[key].ts < STREAMING_CACHE_TTL) {
          streamingCache[key] = parsed[key];
        }
      }
    }
  } catch (e) {}
})();

function saveStreamingCache() {
  try { localStorage.setItem(STREAMING_CACHE_KEY, JSON.stringify(streamingCache)); } catch (e) {}
}

function checkStreamingBudget() {
  try {
    const stored = JSON.parse(localStorage.getItem('flickpick_streaming_budget') || '{}');
    const currentMonth = new Date().toISOString().slice(0, 7);
    if (stored.month !== currentMonth) return { month: currentMonth, count: 0 };
    return stored;
  } catch (e) { return { month: new Date().toISOString().slice(0, 7), count: 0 }; }
}

function incrementStreamingBudget() {
  const budget = checkStreamingBudget();
  budget.count++;
  localStorage.setItem('flickpick_streaming_budget', JSON.stringify(budget));
}

async function fetchStreamingLinks(title, year) {
  const cacheKey = `${title}::${year || ''}`;
  if (streamingCache[cacheKey] && streamingCache[cacheKey].data) {
    return streamingCache[cacheKey].data;
  }

  // Check budget
  const budget = checkStreamingBudget();
  if (budget.count >= 900) {
    console.warn('Streaming API monthly budget nearly exhausted, skipping');
    return null;
  }

  await fetchPoster(title, year);
  const info = getTmdbInfo(title, year);
  if (!info) return null;

  try {
    const res = await fetch(`/api/streaming?tmdbId=${info.tmdbId}&type=${info.mediaType}`);
    if (!res.ok) return null;
    const data = await res.json();

    const options = data.streamingOptions?.us || [];
    if (options.length === 0) {
      streamingCache[cacheKey] = { data: null, ts: Date.now() };
      saveStreamingCache();
      return null;
    }

    // Deduplicate by service, preferring subscription > free > addon > rent > buy
    const typePriority = { subscription: 0, free: 1, addon: 2, rent: 3, buy: 4 };
    const byService = {};
    for (const opt of options) {
      const sid = opt.service.id;
      if (!byService[sid] || (typePriority[opt.type] || 99) < (typePriority[byService[sid].type] || 99)) {
        byService[sid] = opt;
      }
    }

    const result = Object.values(byService).map(opt => ({
      serviceId: opt.service.id,
      serviceName: opt.service.name,
      type: opt.type,
      link: opt.link,
      logoUrl: opt.service.imageSet?.darkThemeImage || null
    }));

    streamingCache[cacheKey] = { data: result, ts: Date.now() };
    saveStreamingCache();
    incrementStreamingBudget();
    return result;
  } catch (err) {
    console.warn('Streaming Availability fetch failed:', err.message);
    return null;
  }
}

// ─── PROVIDER RENDERING ─────────────────────────────────────────────────────
const PROVIDER_ALIASES = {
  'amazon prime video': 'prime',
  'disney plus': 'disney',
  'disney+': 'disney',
  'hbo max': 'max',
  'paramount+': 'paramount',
  'paramount plus': 'paramount',
  'apple tv+': 'apple',
  'apple tv plus': 'apple',
  'peacock premium': 'peacock',
};

function renderProviders(providers, watchLink, streamingLinks) {
  // Build lookup: normalized name/alias → direct link
  const directLinks = {};
  if (streamingLinks) {
    for (const s of streamingLinks) {
      directLinks[s.serviceName.toLowerCase()] = s.link;
      directLinks[s.serviceId.toLowerCase()] = s.link;
    }
  }

  function findDirectLink(providerName) {
    const name = providerName.toLowerCase();
    if (directLinks[name]) return directLinks[name];
    const alias = PROVIDER_ALIASES[name];
    if (alias && directLinks[alias]) return directLinks[alias];
    return null;
  }

  let html = '<div class="watch-providers"><span class="providers-label">Watch on</span>';

  providers.forEach(p => {
    const href = findDirectLink(p.name) || watchLink || null;
    if (href) {
      html += `<a href="${href}" target="_blank" rel="noopener" class="provider-link" title="${p.name}">`;
      html += `<img class="provider-logo" src="${p.logo}" alt="${p.name}">`;
      html += `</a>`;
    } else {
      html += `<img class="provider-logo" src="${p.logo}" alt="${p.name}" title="${p.name}">`;
    }
  });

  // Render streaming services not in TMDB's list
  if (streamingLinks) {
    const tmdbNames = new Set(providers.map(p => p.name.toLowerCase()));
    const tmdbAliases = new Set();
    providers.forEach(p => {
      const alias = PROVIDER_ALIASES[p.name.toLowerCase()];
      if (alias) tmdbAliases.add(alias);
    });
    for (const s of streamingLinks) {
      if (!tmdbNames.has(s.serviceName.toLowerCase()) && !tmdbAliases.has(s.serviceId) && s.logoUrl) {
        html += `<a href="${s.link}" target="_blank" rel="noopener" class="provider-link" title="${s.serviceName}">`;
        html += `<img class="provider-logo" src="${s.logoUrl}" alt="${s.serviceName}">`;
        html += `</a>`;
      }
    }
  }

  html += '</div>';
  return html;
}

// ─── TRAILER MODAL ──────────────────────────────────────────────────────────
function openTrailerModal(youtubeKey) {
  const existing = document.getElementById('trailer-modal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'trailer-modal';
  modal.className = 'trailer-modal';
  modal.innerHTML = `
    <div class="trailer-modal-backdrop"></div>
    <div class="trailer-modal-content">
      <button class="trailer-modal-close" onclick="closeTrailerModal()">&times;</button>
      <iframe src="https://www.youtube.com/embed/${youtubeKey}?autoplay=1&rel=0"
        frameborder="0" allowfullscreen
        allow="autoplay; encrypted-media; picture-in-picture">
      </iframe>
    </div>
  `;
  document.body.appendChild(modal);
  modal.querySelector('.trailer-modal-backdrop').addEventListener('click', closeTrailerModal);
  document.addEventListener('keydown', function escHandler(e) {
    if (e.key === 'Escape') { closeTrailerModal(); document.removeEventListener('keydown', escHandler); }
  });
}

function closeTrailerModal() {
  const modal = document.getElementById('trailer-modal');
  if (modal) modal.remove();
}

function playTrailer(title, year, btn) {
  if (btn) btn.textContent = '⏳';
  fetchTmdbExtras(title, year).then(({ trailerKey }) => {
    if (trailerKey) {
      openTrailerModal(trailerKey);
    }
    if (btn) btn.textContent = '▶ Trailer';
  });
}

function loadFeaturedExtras(title, year) {
  Promise.all([
    fetchTmdbExtras(title, year),
    fetchStreamingLinks(title, year)
  ]).then(([{ trailerKey, providers, watchLink }, streamingLinks]) => {
    if (!trailerKey && providers.length === 0 && !streamingLinks) return;

    const actionsEl = document.querySelector('#featured-card .featured-actions');
    if (!actionsEl) return;

    let html = '<div class="featured-extras">';
    if (trailerKey) {
      html += `<button class="trailer-btn" onclick="openTrailerModal('${trailerKey}')">&#9654; Watch Trailer</button>`;
    }
    if (providers.length > 0 || streamingLinks) {
      html += renderProviders(providers, watchLink, streamingLinks);
    }
    html += '</div>';

    actionsEl.insertAdjacentHTML('beforebegin', html);
  });
}

function loadState() {
  try {
    const s = localStorage.getItem('flickpick_state');
    if (s) {
      const parsed = JSON.parse(s);
      state.seen = parsed.seen || {};
      state.want = parsed.want || {};
      state.nope = parsed.nope || {};
      // Ensure all seen items have a rating field
      for (const id in state.seen) {
        if (state.seen[id].rating === undefined) state.seen[id].rating = null;
      }
    }
  } catch(e) {}
}

function getExclusionList() {
  const titles = new Set();
  for (const item of Object.values(state.nope)) titles.add(item.title);
  for (const item of Object.values(state.seen)) titles.add(item.title);
  if (titles.size === 0) return '';
  const list = [...titles].map(t => `- ${t}`).join('\n');
  return `\n\nDo NOT include any of these titles (the user has already seen or rejected them):\n${list}`;
}

function getShownExclusion() {
  const titles = new Set();
  for (const id of shownIds) {
    const item = state.seen[id] || state.want[id] || state.nope[id];
    if (item) titles.add(item.title);
  }
  // Also grab titles from the current grid directly
  document.querySelectorAll('#similar-grid .similar-title').forEach(el => {
    titles.add(el.textContent);
  });
  if (currentFeatured) titles.add(currentFeatured.title);
  if (titles.size === 0) return '';
  const list = [...titles].map(t => `- ${t}`).join('\n');
  return `\n\nAlso do NOT include these already-shown titles:\n${list}`;
}

function filterResults(items) {
  return items.filter(item => !state.nope[item.id] && !state.seen[item.id]);
}

// ─── DISCOVER CAROUSELS ─────────────────────────────────────────────────────
const CAROUSEL_PAGE = 4;
const CAROUSEL_PAGE_MOBILE = 3;
const carouselState = { watchlist: { page: 0 }, loved: { page: 0, items: [] } };
let lovedRecsCache = null;

function getCarouselPageSize() {
  return window.innerWidth <= 600 ? CAROUSEL_PAGE_MOBILE : CAROUSEL_PAGE;
}

function renderCarouselItem(item) {
  const emoji = item.emoji || genreEmoji(item.genres || '');
  const safeTitle = item.title.replace(/"/g, '&quot;');
  return `
    <div class="carousel-item" data-search-title="${safeTitle}">
      <div class="carousel-item-placeholder" data-car-poster="${item.id || item.title}">
        ${emoji}
      </div>
      <div class="carousel-item-title" title="${safeTitle}">${item.title}</div>
    </div>`;
}

function loadCarouselPoster(item, selector) {
  fetchPoster(item.title, item.year).then(url => {
    if (!url) return;
    const el = document.querySelector(`[data-car-poster="${item.id || item.title}"]`);
    if (!el) return;
    const img = document.createElement('img');
    img.src = url;
    img.alt = item.title;
    img.className = 'carousel-item-poster';
    img.onload = () => el.replaceWith(img);
  });
}

function renderWatchlistCarousel() {
  const items = Object.values(state.want);
  const section = document.getElementById('watchlist-carousel');
  if (items.length === 0) { section.style.display = 'none'; return; }
  section.style.display = '';

  const pageSize = getCarouselPageSize();
  const s = carouselState.watchlist;
  const start = s.page * pageSize;
  const batch = items.slice(start, start + pageSize);
  const track = document.getElementById('wl-car-track');
  track.style.gridTemplateColumns = `repeat(${pageSize}, 1fr)`;
  track.innerHTML = batch.map(item => renderCarouselItem(item)).join('');
  batch.forEach(item => loadCarouselPoster(item));

  document.getElementById('wl-car-prev').disabled = s.page === 0;

function displayLovedCarousel(items) {
  carouselState.loved.items = items;

  const s = carouselState.loved;
  const start = s.page * pageSize;
  const batch = items.slice(start, start + pageSize);
  const track = document.getElementById('loved-car-track');
  track.style.gridTemplateColumns = `repeat(${pageSize}, 1fr)`;
  track.innerHTML = batch.map(item => renderCarouselItem(item)).join('');

  document.getElementById('loved-car-prev').disabled = s.page === 0;

// ─── GENRE EMOJI ─────────────────────────────────────────────────────────────
function genreEmoji(genres) {
  const g = (genres || '').toLowerCase();
  if (g.includes('horror')) return '👻';
  if (g.includes('sci-fi') || g.includes('science fiction')) return '🚀';
  if (g.includes('comedy')) return '😂';
  if (g.includes('romance')) return '💕';
  if (g.includes('thriller') || g.includes('mystery')) return '🔍';
  if (g.includes('animation') || g.includes('anime')) return '✨';
  if (g.includes('crime')) return '🔫';
  if (g.includes('action') || g.includes('adventure')) return '⚡';
  if (g.includes('drama')) return '🎭';
  if (g.includes('documentary')) return '🎬';
  if (g.includes('fantasy')) return '🧙';
  return '🎞️';
}

// ─── BUFFER SYSTEM ───────────────────────────────────────────────────────────
function maybeRefillBuffer() {
  if (replacementBuffer.length < BUFFER_LOW && !bufferFetching && currentFeatured) {
    fillBuffer();
  }
}

async function fillBuffer() {
  if (bufferFetching || !currentFeatured) return;
  bufferFetching = true;

  try {
    const exclusion = getExclusionList() + getShownExclusion();
    const prompt = `You are a film and TV expert for Flickpick.

The user is exploring titles similar to: "${currentFeatured.title}" (${currentFeatured.type}, ${currentFeatured.year})

They want MORE recommendations beyond what's already been shown.${exclusion}

Return ONLY a JSON object with exactly this structure, no markdown:
{
  "similar": [
    {
      "id": "unique-slug",
      "title": "Title",
      "type": "TV Show" or "Movie",
      "year": "2022",
      "genres": "Comedy, Drama",
      "description": "1-2 sentences about why a fan would enjoy this.",
      "emoji": "single relevant emoji"
    }
  ]
}

Return exactly 4 similar titles. Real, well-known titles only. Lowercase hyphenated ids. Dig deep — suggest lesser-known gems, not just the obvious picks.`;

    const res = await fetch("/api/recommend", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1200,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content[0].text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(text);
    const filtered = filterResults(result.similar);

    filtered.forEach(item => {
      if (!shownIds.has(item.id)) {
        replacementBuffer.push(item);
        shownIds.add(item.id);
      }
    });

    // Fill any waiting placeholders
    fillWaitingPlaceholders();
  } catch(e) {
    console.error('Buffer fill error:', e);
  }

  bufferFetching = false;
}

function fillWaitingPlaceholders() {
  const placeholders = document.querySelectorAll('.similar-card.loading-placeholder');
  if (placeholders.length === 0) return;

  placeholders.forEach(ph => {
    if (replacementBuffer.length > 0) {
      const item = replacementBuffer.shift();
      ph.outerHTML = renderSingleCard(item);
      loadPosterFor(item.id, item.title, item.year);
    }
  });

  // If there are still placeholders and we're not fetching, try again
  const remaining = document.querySelectorAll('.similar-card.loading-placeholder');
  if (remaining.length > 0 && !bufferFetching) {
    fillBuffer();
  }
}

function replaceCard(card) {
  if (replacementBuffer.length > 0) {
    const item = replacementBuffer.shift();
    card.classList.add('removing');
    setTimeout(() => {
      card.outerHTML = renderSingleCard(item);
      loadPosterFor(item.id, item.title, item.year);
    }, 300);
  } else {
    card.classList.add('removing');
    setTimeout(() => {
      card.outerHTML = renderPlaceholderCard();
      // Set a timeout — if still a placeholder after 15s, just remove it
      setTimeout(() => {
        const stillWaiting = document.querySelectorAll('.similar-card.loading-placeholder');
        stillWaiting.forEach(ph => ph.remove());
      }, 15000);
    }, 300);
  }
  maybeRefillBuffer();
}

function goBack() {
  if (viewHistory.length === 0) return;
  const prev = viewHistory.pop();

  currentFeatured = prev.featured;
  replacementBuffer = prev.buffer;
  shownIds = prev.shownIds;

  renderFeatured(prev.featured);
  document.getElementById('similar-grid').innerHTML = prev.similarHtml;

  // Re-load posters and refresh button states for restored cards
  document.querySelectorAll('#similar-grid .similar-card').forEach(cardEl => {

    try {

      loadPosterFor(item.id, item.title, item.year);

      // Refresh seen/want/nope button states to match current state
      const seenBtn = cardEl.querySelector('.mini-seen');
      const wantBtn = cardEl.querySelector('.mini-want');
      const nopeBtn = cardEl.querySelector('.mini-nope');
      if (seenBtn) {
        seenBtn.classList.toggle('active', !!state.seen[item.id]);

      }
      if (wantBtn) {

      }
      if (nopeBtn) {
        nopeBtn.classList.toggle('active', !!state.nope[item.id]);
        nopeBtn.textContent = state.nope[item.id] ? '\u2715' : 'Nope';
      }
    } catch(e) {}
  });

  // Also refresh the featured card buttons
  const featuredActions = document.querySelector('.featured-actions');
  if (featuredActions && prev.featured) {
    const id = prev.featured.id;
    const seenBtn = featuredActions.querySelector('.btn-seen');
    const wantBtn = featuredActions.querySelector('.btn-want');
    const nopeBtn = featuredActions.querySelector('.btn-nope');
    if (seenBtn) {
      seenBtn.classList.toggle('active', !!state.seen[id]);
      seenBtn.textContent = state.seen[id] ? '\u2713 Seen' : 'Mark Seen';
    }
    if (wantBtn) {
      wantBtn.classList.toggle('active', !!state.want[id]);
      wantBtn.textContent = state.want[id] ? '\u2605 Saved' : '+ Watchlist';
    }
    if (nopeBtn) {
      nopeBtn.classList.toggle('active', !!state.nope[id]);
      nopeBtn.textContent = state.nope[id] ? '\u2715 Noped' : 'Nope';
    }
  }

  updateBackButton();
  window.scrollTo({ top: 60, behavior: 'smooth' });
}

// ─── TOGGLE SEEN ─────────────────────────────────────────────────────────────
function toggleSeen(id, btn) {
  const item = JSON.parse(btn.getAttribute('data-item').replace(/&#39;/g, "'"));
  const isMini = btn.classList.contains('mini-btn');

  if (state.seen[id]) {
    delete state.seen[id];
    btn.classList.remove('active');
    btn.textContent = isMini ? 'Seen' : 'Mark Seen';
    showToast(`Removed "${item.title}" from seen`);
  } else {
    state.seen[id] = { ...item, rating: null };
    btn.classList.add('active');
    btn.textContent = isMini ? '✓ Seen' : '✓ Seen';
    showToast(`Marked "${item.title}" as seen`);
    if (isMini) {
      const card = btn.closest('.similar-card');
      if (card) { replaceCard(card); saveState(); return; }
    }
  }
  saveState();
}

// ─── TOGGLE NOPE ─────────────────────────────────────────────────────────────
function toggleNope(id, btn) {
  const item = JSON.parse(btn.getAttribute('data-item').replace(/&#39;/g, "'"));
  const isMini = btn.classList.contains('mini-btn');

  if (state.nope[id]) {
    delete state.nope[id];
    btn.classList.remove('active');
    btn.textContent = isMini ? 'Nope' : 'Nope';
    showToast(`Removed "${item.title}" from nope list`);
  } else {
    state.nope[id] = item;
    btn.classList.add('active');
    btn.textContent = isMini ? '✕' : '✕ Noped';
    showToast(`"${item.title}" noped`);
    if (isMini) {
      const card = btn.closest('.similar-card');
      if (card) { replaceCard(card); saveState(); return; }
    }
  }
  saveState();
}

      <div class="watchlist-info">
        <div class="watchlist-header">
          <div class="watchlist-title clickable-title" data-search-title="${item.title.replace(/"/g, '&quot;')}">${item.title}</div>
          <div class="watchlist-type">${item.type}</div>
        </div>
        <div class="watchlist-meta">${item.year} · ${item.genres}</div>
        <div class="watchlist-desc">${item.description || ''}</div>
        <div class="watchlist-extras" data-wl-extras="${item.id}"></div>
        <div class="watchlist-actions">
          <button class="btn-remove" onclick="removeFromWant('${item.id}')">Remove</button>
        </div>
      </div>
    </div>`;
}

function loadWatchlistExtras(item) {
  // Load poster
  fetchPoster(item.title, item.year).then(url => {
    if (!url) return;
    const el = document.querySelector(`[data-wl-poster="${item.id}"]`);
    if (!el) return;
    const img = document.createElement('img');
    img.src = url;
    img.alt = item.title;
    img.className = 'watchlist-poster clickable-title';
    img.setAttribute('data-search-title', item.title);
    img.style.cursor = 'pointer';
    img.onload = () => el.replaceWith(img);
  });

  // Load trailer + providers + streaming links in parallel
  Promise.all([
    fetchTmdbExtras(item.title, item.year),
    fetchStreamingLinks(item.title, item.year)
  ]).then(([{ trailerKey, providers, watchLink }, streamingLinks]) => {
    const extrasEl = document.querySelector(`[data-wl-extras="${item.id}"]`);
    if (!extrasEl) return;
    if (!trailerKey && providers.length === 0 && !streamingLinks) return;

    let html = '';
    if (trailerKey) {
      html += `<button class="mini-trailer-btn" onclick="openTrailerModal('${trailerKey}')">&#9654; Trailer</button>`;
    }
    if (providers.length > 0 || streamingLinks) {
      html += renderProviders(providers, watchLink, streamingLinks);
    }
    extrasEl.innerHTML = html;
  });
}

function renderWatchlist() {
  const items = Object.values(state.want);
  const sub = document.getElementById('watchlist-subheading');
  const container = document.getElementById('want-list-container');

  sub.textContent = items.length === 0
    ? 'Nothing saved yet'
    : `${items.length} title${items.length === 1 ? '' : 's'} saved`;

  if (items.length === 0) {
    container.innerHTML = `
      <div class="want-empty">
        <div class="want-empty-icon">🎬</div>
        <div class="want-empty-text">Search for something and hit "+ Watchlist" to save it here.</div>
      </div>`;
    watchlistShown = 0;
    return;
  }

  // Show first batch
  watchlistShown = 0;
  const batch = items.slice(0, WATCHLIST_PAGE_SIZE);
  watchlistShown = batch.length;

  let html = `<div class="watchlist-grid" id="watchlist-grid">`;
  html += batch.map(item => renderWatchlistCard(item)).join('');
  html += `</div>`;

  if (items.length > watchlistShown) {
    html += `<button class="btn-load-more" id="wl-load-more" onclick="loadMoreWatchlist()">Load More (${items.length - watchlistShown} remaining)</button>`;
  }

  container.innerHTML = html;

  // Async load posters + extras for visible cards
  batch.forEach(item => loadWatchlistExtras(item));
}

function loadMoreWatchlist() {
  const items = Object.values(state.want);
  const grid = document.getElementById('watchlist-grid');
  if (!grid) return;

  const batch = items.slice(watchlistShown, watchlistShown + WATCHLIST_PAGE_SIZE);
  watchlistShown += batch.length;

  batch.forEach(item => {
    grid.insertAdjacentHTML('beforeend', renderWatchlistCard(item));
    loadWatchlistExtras(item);
  });

  const loadMoreBtn = document.getElementById('wl-load-more');
  if (watchlistShown >= items.length) {
    if (loadMoreBtn) loadMoreBtn.remove();
  } else if (loadMoreBtn) {
    loadMoreBtn.textContent = `Load More (${items.length - watchlistShown} remaining)`;
  }
}

function removeFromWant(id) {
  const item = state.want[id];
  if (!item) return;
  delete state.want[id];
  saveState();
  const el = document.getElementById('wl-' + id);
  if (el) { el.style.transition = 'all 0.3s'; el.style.opacity = '0'; el.style.transform = 'scale(0.95)'; setTimeout(() => el.remove(), 300); }
  showToast(`Removed "${item.title}"`);
  const remaining = Object.keys(state.want).length;
  document.getElementById('watchlist-subheading').textContent =
    remaining === 0 ? 'Nothing saved yet' : `${remaining} title${remaining === 1 ? '' : 's'} saved`;
  if (remaining === 0) setTimeout(() => renderWatchlist(), 350);
}

// ─── SEEN PAGE ───────────────────────────────────────────────────────────────
const SEEN_PAGE_SIZE = 10;
let seenShown = 0;

function renderSeenCard(item) {
  const emoji = item.emoji || genreEmoji(item.genres);
  const cardId = `seen-${item.id}`;
  const r = item.rating;
  return `
    <div class="watchlist-card" id="${cardId}">
      <div class="watchlist-poster-placeholder clickable-title" data-seen-poster="${item.id}" data-search-title="${item.title.replace(/"/g, '&quot;')}">
        ${emoji}
      </div>
      <div class="watchlist-info">
        <div class="watchlist-header">
          <div class="watchlist-title clickable-title" data-search-title="${item.title.replace(/"/g, '&quot;')}">${item.title}</div>
          <div class="watchlist-type">${item.type}</div>
        </div>
        <div class="watchlist-meta">${item.year} · ${item.genres}</div>
        <div class="watchlist-desc">${item.description || ''}</div>
        <div class="watchlist-extras" data-seen-extras="${item.id}"></div>
        <div class="seen-rating-row">
          <button class="rating-btn ${r === 'loved' ? 'active-loved' : ''}" onclick="setRating('${item.id}', 'loved', this)" title="Loved">❤️</button>
          <button class="rating-btn ${r === 'liked' ? 'active-liked' : ''}" onclick="setRating('${item.id}', 'liked', this)" title="Liked">👍</button>
          <button class="rating-btn ${r === 'disliked' ? 'active-disliked' : ''}" onclick="setRating('${item.id}', 'disliked', this)" title="Disliked">👎</button>
        </div>
        <div class="watchlist-actions">
          <button class="btn-remove" onclick="removeFromSeen('${item.id}')">Remove</button>
        </div>
      </div>
    </div>`;
}

function loadSeenExtras(item) {
  fetchPoster(item.title, item.year).then(url => {
    if (!url) return;
    const el = document.querySelector(`[data-seen-poster="${item.id}"]`);
    if (!el) return;
    const img = document.createElement('img');
    img.src = url;
    img.alt = item.title;
    img.className = 'watchlist-poster clickable-title';
    img.setAttribute('data-search-title', item.title);
    img.style.cursor = 'pointer';
    img.onload = () => el.replaceWith(img);
  });

  Promise.all([
    fetchTmdbExtras(item.title, item.year),
    fetchStreamingLinks(item.title, item.year)
  ]).then(([{ trailerKey, providers, watchLink }, streamingLinks]) => {
    const extrasEl = document.querySelector(`[data-seen-extras="${item.id}"]`);
    if (!extrasEl) return;
    if (!trailerKey && providers.length === 0 && !streamingLinks) return;

    let html = '';
    if (trailerKey) {
      html += `<button class="mini-trailer-btn" onclick="openTrailerModal('${trailerKey}')">&#9654; Trailer</button>`;
    }
    if (providers.length > 0 || streamingLinks) {
      html += renderProviders(providers, watchLink, streamingLinks);
    }
    extrasEl.innerHTML = html;
  });
}

function renderSeenList() {
  const items = Object.values(state.seen);
  const sub = document.getElementById('seen-subheading');
  const container = document.getElementById('seen-list-container');

  sub.textContent = items.length === 0
    ? 'Nothing marked as seen yet'
    : `${items.length} title${items.length === 1 ? '' : 's'} seen`;

  if (items.length === 0) {
    container.innerHTML = `
      <div class="want-empty">
        <div class="want-empty-icon">👀</div>
        <div class="want-empty-text">Mark shows as "Seen" in Discover to track them here.</div>
      </div>`;
    seenShown = 0;
    return;
  }

  seenShown = 0;
  const batch = items.slice(0, SEEN_PAGE_SIZE);
  seenShown = batch.length;

  let html = `<div class="watchlist-grid" id="seen-grid">`;
  html += batch.map(item => renderSeenCard(item)).join('');
  html += `</div>`;

  if (items.length > seenShown) {
    html += `<button class="btn-load-more" id="seen-load-more" onclick="loadMoreSeen()">Load More (${items.length - seenShown} remaining)</button>`;
  }

  container.innerHTML = html;
  batch.forEach(item => loadSeenExtras(item));
}

function loadMoreSeen() {
  const items = Object.values(state.seen);
  const grid = document.getElementById('seen-grid');
  if (!grid) return;

  const batch = items.slice(seenShown, seenShown + SEEN_PAGE_SIZE);
  seenShown += batch.length;

  batch.forEach(item => {
    grid.insertAdjacentHTML('beforeend', renderSeenCard(item));
    loadSeenExtras(item);
  });

  const loadMoreBtn = document.getElementById('seen-load-more');
  if (seenShown >= items.length) {
    if (loadMoreBtn) loadMoreBtn.remove();
  } else if (loadMoreBtn) {
    loadMoreBtn.textContent = `Load More (${items.length - seenShown} remaining)`;
  }
}

function setRating(id, rating, btn) {
  if (!state.seen[id]) return;
  if (state.seen[id].rating === rating) {
    state.seen[id].rating = null;
  } else {
    state.seen[id].rating = rating;
  }
  saveState();
  const row = btn.closest('.seen-rating-row');
  row.querySelectorAll('.rating-btn').forEach(b => {
    b.classList.remove('active-loved', 'active-liked', 'active-disliked');
  });
  const r = state.seen[id].rating;
  if (r) {
    btn.classList.add('active-' + r);
  }
}

function removeFromSeen(id) {
  const item = state.seen[id];
  if (!item) return;
  delete state.seen[id];
  saveState();
  const el = document.getElementById('seen-' + id);
  if (el) { el.style.transition = 'all 0.3s'; el.style.opacity = '0'; el.style.transform = 'scale(0.95)'; setTimeout(() => el.remove(), 300); }
  showToast(`Removed "${item.title}" from seen`);
  const remaining = Object.keys(state.seen).length;
  document.getElementById('seen-subheading').textContent =
    remaining === 0 ? 'Nothing marked as seen yet' : `${remaining} title${remaining === 1 ? '' : 's'} seen`;
  if (remaining === 0) setTimeout(() => renderSeenList(), 350);
}
</script>
